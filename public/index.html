<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky">

<!-- 🎨 IMAGE SOURCE -->
<img id="sourceImage" src="/background.jpg" style="display:none;">

<!-- 🚀 CANVAS 4K PIXEL -->
<canvas id="gameCanvas"></canvas>

<!-- 🔥 INTERFACE -->
<h1 class="title">Niche Finder</h1>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown">
<option>5</option>
<option>10</option>
<option>20</option>
<option>50</option>
</select>

<button class="start-btn">START</button>

</div>

</div>

<!-- 🚀 SCRIPT ANIMATION -->
<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d",{ willReadFrequently:true });
const img = document.getElementById("sourceImage");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pixels = [];
let moneyParticles = [];

/* ================= PIXEL ENGINE ================= */

img.onload = function(){

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const pixelSize = 2; // 🔥 Ultra haute résolution
const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Create pixels */
for(let y=0;y<canvas.height;y+=pixelSize){
for(let x=0;x<canvas.width;x+=pixelSize){

let i = (y*canvas.width + x)*4;

pixels.push({
x:x,
y:y,
r:data[i],
g:data[i+1],
b:data[i+2],
alpha:1,
vy:Math.random()*0.4
});

}
}

animate();

};

/* ================= MONEY SYSTEM ================= */

function spawnMoney(){

for(let i=0;i<8;i++){

moneyParticles.push({
x:canvas.width/2,
y:canvas.height-250,
vx:(Math.random()-0.5)*5,
vy:-Math.random()*6 -2,
alpha:1
});

}

}

/* Spawn billets toutes les 2 secondes */
setInterval(spawnMoney,2000);

/* ================= ANIMATION LOOP ================= */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* ---- PIXELS ---- */
pixels.forEach(p=>{

p.y += p.vy;
p.alpha -= 0.0004;

ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
ctx.fillRect(p.x,p.y,2,2);

});

/* ---- MONEY ---- */
moneyParticles.forEach((m,index)=>{

m.x += m.vx;
m.y += m.vy;
m.vy += 0.1;
m.alpha -= 0.01;

ctx.globalAlpha = m.alpha;
ctx.font = "28px Arial";
ctx.fillText("💵",m.x,m.y);

if(m.alpha <= 0){
moneyParticles.splice(index,1);
}

});

ctx.globalAlpha = 1;

requestAnimationFrame(animate);
}

</script>

</body>
</html>
