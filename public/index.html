<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niche Finder</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<!-- ===================================================== -->
<!-- ANIMATED WORLD -->
<!-- ===================================================== -->

<div class="world">

  <div class="sky"></div>
  <div class="sun"></div>
  <div class="grass"></div>

  <div class="doghouse">🏠</div>

  <div class="dogs"></div>

  <div class="money-rain"></div>

</div>

<!-- ===================================================== -->
<!-- UI -->
<!-- ===================================================== -->

<h1 class="title">Niche Finder</h1>

<div class="main-center">

<div class="search-box">

<input type="text" id="keyword" placeholder="Keyword">

<select id="limit">
<option value="1">1</option>
<option value="10">10</option>
<option value="50">50</option>
<option value="100">100</option>
</select>

<button onclick="searchEtsy()" class="start-btn">
🚨 START
</button>

</div>

<div id="results"></div>

</div>

<!-- ===================================================== -->
<!-- ANIMATION SCRIPT -->
<!-- ===================================================== -->

<script>

/* ================= DOG SPAWNER ================= */

const world = document.querySelector(".world");

function spawnDog(){

  const dog = document.createElement("div");
  dog.className = "dogs";
  dog.innerHTML = "🐕";

  dog.style.top = (60 + Math.random()*15) + "%";

  world.appendChild(dog);

  setTimeout(()=>dog.remove(),6000);
}

setInterval(spawnDog,2000);

/* ================= MONEY SPAWNER ================= */

function spawnMoney(){

  const money = document.createElement("div");
  money.className = "money";
  money.innerHTML = "$";

  money.style.left = (45 + Math.random()*10) + "%";
  money.style.bottom = "40%";

  world.appendChild(money);

  setTimeout(()=>money.remove(),4000);
}

setInterval(spawnMoney,800);

</script>

<!-- ===================================================== -->
<!-- SEARCH SCRIPT -->
<!-- ===================================================== -->

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
