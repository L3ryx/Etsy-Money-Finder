<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky">

<!-- 🎨 CANVAS BACKGROUND -->
<canvas id="gameCanvas"></canvas>
<img id="sourceImage" src="/background.jpg" style="display:none;">

<!-- 🔥 INTERFACE -->
<h1 class="title">Niche Finder</h1>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown">
<option value="5">Analyse 5 annonces</option>
<option value="10">Analyse 10 annonces</option>
<option value="20">Analyse 20 annonces</option>
<option value="50">Analyse 50 annonces</option>
</select>

<button class="start-btn">START</button>

</div>

</div>

<!-- 🚀 PIXEL ANIMATION SCRIPT -->
<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const img = document.getElementById("sourceImage");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

img.onload = function(){
initPixels();
animate();
};

function initPixels(){

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
const data = imageData.data;

for(let y=0;y<canvas.height;y+=20){
for(let x=0;x<canvas.width;x+=20){

let index = (y*canvas.width + x)*4;
let r = data[index];
let g = data[index+1];
let b = data[index+2];

particles.push({
x:x,
y:y,
color:`rgb(${r},${g},${b})`,
size:20,
vy:Math.random()*2
});

}
}

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

p.y += p.vy;

ctx.fillStyle = p.color;
ctx.fillRect(p.x,p.y,p.size,p.size);

});

requestAnimationFrame(animate);
}

</script>

</body>
</html>
