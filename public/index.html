<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ================= BACKGROUND TOOL ================= -->

<div class="container">

<h1 class="title">Niche Finder</h1>
<p class="subtitle">Les niches n'ont plus de secrets !</p>

</div>

<!-- ================= AUTH BOX PREMIUM ================= -->

<div id="authBox">

<div class="form-container" id="formContainer">

<!-- 🔵 INSCRIPTION FORM -->

<div class="form active" id="registerForm">

<h2>Créer un compte</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="register()">
Créer un compte
</button>

<p class="switch-text">
Déjà inscrit ?
<span onclick="switchForm()" class="switch-link">
Sign in
</span>
</p>

</div>

<!-- 🔴 LOGIN FORM -->

<div class="form" id="loginForm">

<h2>Connexion</h2>

<input type="email" id="loginEmail" placeholder="Email">
<input type="password" id="loginPassword" placeholder="Mot de passe">

<button onclick="login()">
Login
</button>

<p class="switch-text">
Pas encore de compte ?
<span onclick="switchForm()" class="switch-link">
Créer un compte
</span>
</p>

</div>

</div>
</div>

<!-- ================= SCRIPT ================= -->

<script>

/* ================================================= */
/* ================= REGISTER ====================== */
/* ================================================= */

async function register(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

if(res.ok){
alert("Compte créé ✅");
document.getElementById("authBox").style.display="none";
}else{
alert("Erreur inscription");
}

}

/* ================================================= */
/* ================= LOGIN ========================= */
/* ================================================= */

async function login(){

const email = document.getElementById("loginEmail").value;
const password = document.getElementById("loginPassword").value;

const res = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(res.ok){

localStorage.setItem("token",data.token);

alert("Connexion réussie 🔓");

document.getElementById("authBox").style.display="none";

}else{
alert("Login échoué");
}

}

/* ================================================= */
/* ========== SWITCH AVEC ANIMATION ================= */
/* ================================================= */

function switchForm(){

const registerForm = document.getElementById("registerForm");
const loginForm = document.getElementById("loginForm");

registerForm.classList.toggle("active");
loginForm.classList.toggle("active");

}

</script>

</body>
</html>
