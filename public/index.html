<script>

const socket = io();
const loader = document.getElementById("loader");
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

let matrixSpeed = 50;

/* ================================================= */
/* MATRIX SETUP */
/* ================================================= */

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "010101ETSYMONEYFINDER";
const fontSize = 16;

let columns = canvas.width / fontSize;
let drops = [];

for(let i = 0; i < columns; i++){
  drops[i] = 1;
}

let matrixInterval = setInterval(drawMatrix, matrixSpeed);

/* ================================================= */
/* MATRIX SPEED CONTROL */
/* ================================================= */

function setMatrixSpeed(speed){

  matrixSpeed = speed;
  clearInterval(matrixInterval);
  matrixInterval = setInterval(drawMatrix, matrixSpeed);

}

/* ================================================= */
/* DRAW MATRIX */
/* ================================================= */

function drawMatrix(){

  ctx.fillStyle = "rgba(0,0,0,0.08)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff66";
  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++){

    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.98){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

/* ================================================= */
/* RESIZE FIX */
/* ================================================= */

window.addEventListener("resize", () => {

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  columns = canvas.width / fontSize;
  drops = [];

  for(let i = 0; i < columns; i++){
    drops[i] = 1;
  }

});

/* ================================================= */
/* SEARCH FUNCTION */
/* ================================================= */

async function searchEtsy(){

  const keyword = document.getElementById("keyword").value;
  const limit = document.getElementById("limit").value;

  showLoader();

  /* 🔥 MATRIX ACCELERATES */
  setMatrixSpeed(10);

  const response = await fetch("/search-etsy", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ keyword, limit })
  });

  const data = await response.json();

  /* ✅ RESULTS ARRIVED */
  hideLoader();

  /* 🔥 MATRIX SLOWS DOWN */
  setMatrixSpeed(60);

  displayResults(data.results);

  /* 💥 EXPLOSION EFFECT */
  explosionEffect();

}

/* ================================================= */
/* LOADER */
/* ================================================= */

function showLoader(){
  loader.style.display = "block";
}

function hideLoader(){
  loader.style.display = "none";
}

/* ================================================= */
/* RESULTS DISPLAY */
/* ================================================= */

function displayResults(results){

  const container = document.getElementById("results");
  container.innerHTML = "";

  if(!results || results.length === 0){
    container.innerHTML = "<h2>No results found</h2>";
    return;
  }

  results.forEach(item => {

    const card = document.createElement("div");
    card.className = "result-card";

    card.innerHTML = `
      <img src="${item.image}">
      <br>
      🔗 <a href="${item.link}" target="_blank">
        Open Listing
      </a>
    `;

    container.appendChild(card);

  });

}

/* ================================================= */
/* 💥 EXPLOSION EFFECT */
/* ================================================= */

function explosionEffect(){

  const explosion = document.createElement("div");

  explosion.style.position = "fixed";
  explosion.style.top = "50%";
  explosion.style.left = "50%";
  explosion.style.transform = "translate(-50%,-50%)";
  explosion.style.fontSize = "120px";
  explosion.style.opacity = "1";
  explosion.style.transition = "all 1s ease";
  explosion.innerHTML = "💥";

  document.body.appendChild(explosion);

  setTimeout(() => {
    explosion.style.transform = "translate(-50%,-50%) scale(3)";
    explosion.style.opacity = "0";
  }, 100);

  setTimeout(() => {
    explosion.remove();
  }, 1200);

}

</script>
