<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d",{ willReadFrequently:true });
const img = document.getElementById("sourceImage");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pixels = [];
let moneyParticles = [];

/* ================= PIXEL BACKGROUND ================= */

img.onload = function(){

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const pixelSize = 2;
const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<canvas.height;y+=pixelSize){
for(let x=0;x<canvas.width;x+=pixelSize){

let i = (y*canvas.width + x)*4;

pixels.push({
x:x,
y:y,
r:data[i],
g:data[i+1],
b:data[i+2],
alpha:1,
vy:Math.random()*0.3
});

}
}

animate();

};

/* ================= MONEY ================= */

function spawnMoney(){

for(let i=0;i<6;i++){

moneyParticles.push({
x:canvas.width/2,
y:canvas.height-220,
vx:(Math.random()-0.5)*5,
vy:-Math.random()*8 -3,
alpha:1
});

}

}

setInterval(spawnMoney,2500);

/* ================= 🐕 CARTOON DOG ================= */

let dog = {
x:canvas.width/2,
y:canvas.height-200,
vy:0,
jumpForce:-15,
gravity:0.6,
onGround:true,
direction:1
};

function updateDog(){

/* Mouvement horizontal */
dog.x += 1.2 * dog.direction;

if(dog.x > canvas.width - 200 || dog.x < 100){
dog.direction *= -1;
}

/* Saut automatique */
if(dog.onGround){
dog.vy = dog.jumpForce;
dog.onGround = false;
}

/* Gravité */
dog.vy += dog.gravity;
dog.y += dog.vy;

if(dog.y >= canvas.height - 200){
dog.y = canvas.height - 200;
dog.vy = 0;
dog.onGround = true;
}

}

/* ================= DRAW DOG (REAL CARTOON) ================= */

function drawDog(){

ctx.save();
ctx.translate(dog.x,dog.y);

/* BODY */
ctx.fillStyle = "#8B5A2B";
ctx.beginPath();
ctx.ellipse(0,0,70,40,0,0,Math.PI*2);
ctx.fill();

/* HEAD */
ctx.beginPath();
ctx.arc(90,-10,30,0,Math.PI*2);
ctx.fill();

/* EARS */
ctx.beginPath();
ctx.moveTo(80,-40);
ctx.lineTo(90,-80);
ctx.lineTo(100,-40);
ctx.fill();

/* EYES */
ctx.fillStyle = "white";
ctx.beginPath();
ctx.arc(105,-20,6,0,Math.PI*2);
ctx.arc(85,-20,6,0,Math.PI*2);
ctx.fill();

ctx.fillStyle = "black";
ctx.beginPath();
ctx.arc(105,-20,3,0,Math.PI*2);
ctx.arc(85,-20,3,0,Math.PI*2);
ctx.fill();

/* NOSE */
ctx.fillStyle = "black";
ctx.beginPath();
ctx.arc(95,-5,4,0,Math.PI*2);
ctx.fill();

/* LEGS */
ctx.fillStyle = "#6B3E1E";
ctx.fillRect(-50,30,15,30);
ctx.fillRect(-10,30,15,30);
ctx.fillRect(30,30,15,30);
ctx.fillRect(60,30,15,30);

/* TAIL ANIMÉE */
ctx.save();
ctx.translate(-70,-10);
ctx.rotate(Math.sin(Date.now()/200)*0.8);
ctx.fillRect(-40,-5,40,10);
ctx.restore();

ctx.restore();

}

/* ================= ANIMATION LOOP ================= */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Pixels */
pixels.forEach(p=>{
p.y += p.vy;
p.alpha -= 0.0004;

ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
ctx.fillRect(p.x,p.y,2,2);
});

/* Money */
moneyParticles.forEach((m,index)=>{

m.x += m.vx;
m.y += m.vy;
m.vy += 0.1;
m.alpha -= 0.01;

ctx.globalAlpha = m.alpha;
ctx.font = "28px Arial";
ctx.fillText("💵",m.x,m.y);

if(m.alpha <= 0){
moneyParticles.splice(index,1);
}

});

ctx.globalAlpha = 1;

/* Dog */
updateDog();
drawDog();

requestAnimationFrame(animate);
}

</script>
