<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etsy Money Finder</title>

<!-- 🔥 POLICE HACKER -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<script src="/socket.io/socket.io.js"></script>

<style>

/* ================= GLOBAL ================= */

body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
  overflow:auto; /* ✅ permet le scroll */
}

/* ================= MATRIX ================= */

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ================= TITLE HACKER ================= */

.title{
  text-align:center;
  font-size:42px;
  margin-top:30px;
  font-family:'Orbitron', sans-serif;
  letter-spacing:4px;
  text-transform:uppercase;
  color:#00ff66;
  text-shadow:
    0 0 5px #00ff66,
    0 0 10px #00ff66,
    0 0 20px #00ff66;
  animation:glow 2s infinite alternate, glitch 3s infinite;
}

/* Glow animation */

@keyframes glow{
  from{
    text-shadow:
      0 0 5px #00ff66,
      0 0 10px #00ff66;
  }
  to{
    text-shadow:
      0 0 10px #00ff66,
      0 0 20px #00ff66,
      0 0 40px #00ff66;
  }
}

/* Glitch effect */

@keyframes glitch{
  0% { transform: translate(0); }
  20% { transform: translate(-2px,2px); }
  40% { transform: translate(2px,-2px); }
  60% { transform: translate(-2px); }
  80% { transform: translate(2px); }
  100% { transform: translate(0); }
}

/* ================= CENTER ================= */

.main-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:40px;
}

/* ================= SEARCH ================= */

.search-box{
  display:flex;
  gap:10px;
  align-items:center;
}

input, select{
  padding:8px;
  border-radius:8px;
  border:none;
}

/* ================= START BUTTON ================= */

.start-btn{
  background:#00ff66;
  border:none;
  padding:6px 18px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.start-btn:hover{
  transform:scale(1.1);
}

/* ================= LOADER ROTATING ================= */

.loader-container{
  margin-top:25px;
  display:none;
  justify-content:center;
  align-items:center;
}

.loader{
  font-size:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{ transform:rotate(0deg);}
  to{ transform:rotate(360deg);}
}

/* ================= RESULTS ================= */

#results{
  margin-top:20px;
  width:90%;
  text-align:center;
}

.result-card{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

.result-card img{
  border-radius:8px;
}

.result-card a{
  color:#00ffcc;
  text-decoration:none;
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<h1 class="title">Etsy Money Finder</h1>

<div class="main-center">

<div class="search-box">

<input type="text" id="keyword" placeholder="Keyword">

<select id="limit">
<option value="1">1</option>
<option value="10">10</option>
<option value="50">50</option>
<option value="100">100</option>
<option value="300">300</option>
</select>

<button onclick="searchEtsy()" class="start-btn">
🚀 START
</button>

</div>

<!-- 🔥 LOADER -->
<div class="loader-container" id="loader">
<div class="loader">🔥</div>
</div>

<div id="results"></div>

</div>

<script>

const loader = document.getElementById("loader");

/* ================= SEARCH ================= */

async function searchEtsy(){

  showLoader();

  const keyword = document.getElementById("keyword").value;
  const limit = document.getElementById("limit").value;

  const response = await fetch("/search-etsy", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ keyword, limit })
  });

  const data = await response.json();

  hideLoader();

  displayResults(data.results);
}

/* ================= LOADER ================= */

function showLoader(){
  loader.style.display = "flex";
}

function hideLoader(){
  loader.style.display = "none";
}

/* ================= RESULTS ================= */

function displayResults(results){

  const container = document.getElementById("results");
  container.innerHTML = "";

  if(!results || results.length === 0){
    container.innerHTML = "<h3>No results found</h3>";
    return;
  }

  results.forEach(item => {

    const card = document.createElement("div");
    card.className = "result-card";

    card.innerHTML = `
      <img src="${item.image}" width="200"><br><br>
      🔗 <a href="${item.link}" target="_blank">
        Open Listing
      </a>
    `;

    container.appendChild(card);

  });
}

/* ================= MATRIX BACKGROUND ================= */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "010101ETSYMONEYFINDER";
const fontSize = 16;

let columns = canvas.width / fontSize;
let drops = [];

for(let i=0;i<columns;i++){
  drops[i]=1;
}

function drawMatrix(){

  ctx.fillStyle="rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="#00ff00";
  ctx.font = fontSize+"px monospace";

  for(let i=0;i<drops.length;i++){

    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random()>0.975){
      drops[i]=0;
    }

    drops[i]++;
  }
}

setInterval(drawMatrix,50);

/* ================= RESIZE FIX ================= */

window.addEventListener("resize",()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  columns = canvas.width/fontSize;
  drops=[];
  for(let i=0;i<columns;i++){
    drops[i]=1;
  }
});

</script>

</body>
</html>
