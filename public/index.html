<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>

<style>

/* ================= GLOBAL ================= */

html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:Arial;
}

/* ================= WORLD ================= */

.world{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

/* SKY */

.sky{
  position:absolute;
  top:0;
  width:100%;
  height:65%;
  background:linear-gradient(#4da6ff,#87ceeb);
}

/* SUN */

.sun{
  position:absolute;
  top:40px;
  right:80px;
  width:120px;
  height:120px;
  background:yellow;
  border-radius:50%;
  box-shadow:0 0 100px yellow;
  animation:pulse 3s infinite alternate;
}

@keyframes pulse{
  from{transform:scale(1);}
  to{transform:scale(1.2);}
}

/* GRASS */

.grass{
  position:absolute;
  bottom:0;
  width:100%;
  height:35%;
  background:#2ecc71;
}

/* NICHES */

.doghouse{
  position:absolute;
  bottom:30%;
  left:50%;
  transform:translateX(-50%);
  font-size:120px;
}

/* DOGS */

.dog{
  position:absolute;
  bottom:20%;
  font-size:60px;
  animation:dogMove 6s linear infinite;
}

@keyframes dogMove{
  0%{
    left:-20%;
  }
  40%{
    left:45%;
  }
  60%{
    opacity:0;
    left:50%;
  }
  100%{
    left:120%;
    opacity:0;
  }
}

/* MONEY */

.money{
  position:absolute;
  bottom:40%;
  font-size:30px;
  color:gold;
  animation:moneyFly 4s linear infinite;
  text-shadow:0 0 10px gold;
}

@keyframes moneyFly{
  from{
    transform:translateY(0) scale(1);
    opacity:1;
  }
  to{
    transform:translateY(-300px) scale(0);
    opacity:0;
  }
}

/* ================= UI ================= */

.title{
  text-align:center;
  margin-top:40px;
  font-size:50px;
  color:red;
}

.main{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
  margin-top:40px;
}

input,select{
  padding:12px;
  border-radius:10px;
  border:2px solid red;
  width:250px;
  text-align:center;
}

button{
  background:red;
  color:white;
  padding:15px 60px;
  border:none;
  border-radius:40px;
  font-size:20px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.1);
}

</style>
</head>
<body>

<!-- BACKGROUND -->

<div class="world">

  <div class="sky"></div>
  <div class="sun"></div>
  <div class="grass"></div>

  <div class="doghouse">🏠</div>

</div>

<!-- UI -->

<h1 class="title">Niche Finder</h1>

<div class="main">

<input type="text" placeholder="Keyword">
<select>
<option>10</option>
<option>50</option>
</select>

<button>START</button>

</div>

<script>

/* ================= SPAWN DOGS ================= */

const world = document.querySelector(".world");

function spawnDog(){
  const dog = document.createElement("div");
  dog.className = "dog";
  dog.innerHTML = "🐕";
  dog.style.top = (60 + Math.random()*10) + "%";

  world.appendChild(dog);

  setTimeout(()=>dog.remove(),6000);
}

setInterval(spawnDog,2000);

/* ================= SPAWN MONEY ================= */

function spawnMoney(){
  const money = document.createElement("div");
  money.className = "money";
  money.innerHTML = "$";

  money.style.left = (45 + Math.random()*10) + "%";

  world.appendChild(money);

  setTimeout(()=>money.remove(),4000);
}

setInterval(spawnMoney,800);

</script>

</body>
</html>
