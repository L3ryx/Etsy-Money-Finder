<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AliExpress Image Finder Pro</title>
<link rel="stylesheet" href="style.css">

<!-- Socket.IO -->
<script src="/socket.io/socket.io.js"></script>
</head>
<body>

<div class="container">

  <h1>🖼 AliExpress Image Finder</h1>

  <!-- ========================================= -->
  <!-- UPLOAD FORM -->
  <!-- ========================================= -->
  <div class="card">
    <h2>📤 Rechercher un mot-clé Etsy</h2>

    <form id="searchForm">
      <input type="text" id="keyword" placeholder="Mot clé..." required>
      <button type="submit">🚀 Rechercher</button>
    </form>
  </div>

  <!-- ========================================= -->
  <!-- LIVE LOGS -->
  <!-- ========================================= -->
  <div class="card">
    <h2>📊 Live Logs</h2>
    <div id="logs" class="log-box">
      <p>En attente de recherche...</p>
    </div>
  </div>

  <!-- ========================================= -->
  <!-- RESULTS -->
  <!-- ========================================= -->
  <div class="card">
    <h2>🎯 Résultats</h2>
    <div id="results"></div>
  </div>

</div>

<!-- ========================================= -->
<!-- SCRIPT -->
<!-- ========================================= -->
<script src="script.js"></script>

</body>
</html>
