<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky">

<!-- 🎨 IMAGE -->
<img id="sourceImage" src="/background.jpg" style="display:none;">

<!-- 🚀 CANVAS 4K PIXEL -->
<canvas id="gameCanvas"></canvas>

<!-- 🔥 INTERFACE -->
<h1 class="title">Niche Finder</h1>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown">
<option>5</option>
<option>10</option>
<option>20</option>
<option>50</option>
</select>

<button class="start-btn">START</button>

</div>

<!-- 🐕 DOG -->
<div class="dog"></div>

<!-- 💵 MONEY CONTAINER -->
<div id="moneyContainer"></div>

</div>

<!-- 🚀 SCRIPT 4K + MONEY + TAIL -->
<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d",{ willReadFrequently:true });
const img = document.getElementById("sourceImage");
const moneyContainer = document.getElementById("moneyContainer");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pixels = [];

/* ================= 4K PIXEL ENGINE ================= */

img.onload = function(){

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const pixelSize = 2; // 🔥 Ultra résolution

const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<canvas.height;y+=pixelSize){
for(let x=0;x<canvas.width;x+=pixelSize){

let i = (y*canvas.width + x)*4;

pixels.push({
x:x,
y:y,
r:data[i],
g:data[i+1],
b:data[i+2],
alpha:1,
vy:Math.random()*0.5
});

}
}

animate();

};

/* ================= PIXEL ANIMATION ================= */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pixels.forEach(p=>{

p.y += p.vy;
p.alpha -= 0.0004;

ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
ctx.fillRect(p.x,p.y,2,2);

});

requestAnimationFrame(animate);
}

/* ================= MONEY ANIMATION ================= */

function spawnMoney(){

for(let i=0;i<20;i++){

let money = document.createElement("div");
money.className = "money";
money.innerText = "💵";

money.style.left = "50%";
money.style.bottom = "180px";

moneyContainer.appendChild(money);

setTimeout(()=>{
money.remove();
},4000);

}

}

/* Lance argent toutes les 3 secondes */
setInterval(spawnMoney,3000);

</script>

</body>
</html>
