<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Etsy Money Finder</title>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>

<h1>Etsy Search</h1>

<!-- SEARCH FORM -->
<form id="searchForm">
  <input type="text" id="keyword" placeholder="Keyword" required />
  <input type="number" id="limit" value="10" />
  <button type="submit">Search</button>
</form>

<hr>

<div id="results"></div>

<hr>

<!-- IMAGE ANALYSIS -->
<form id="analyzeForm">
  <input type="file" id="imageInput" multiple />
  <button type="submit">Analyze Image</button>
</form>

<div id="logs"></div>

<script src="script.js"></script>

</body>
</html>
