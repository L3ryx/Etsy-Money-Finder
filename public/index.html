<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky">

<!-- 🎨 IMAGE SOURCE -->
<img id="sourceImage" src="/background.jpg" style="display:none;">

<!-- 🚀 CANVAS PIXEL ANIMATION -->
<canvas id="gameCanvas"></canvas>

<!-- 🔥 INTERFACE -->
<h1 class="title">Niche Finder</h1>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown">
<option value="5">Analyse 5 annonces</option>
<option value="10">Analyse 10 annonces</option>
<option value="20">Analyse 20 annonces</option>
<option value="50">Analyse 50 annonces</option>
</select>

<button class="start-btn">START</button>

</div>

</div>

<!-- 🚀 PIXEL ENGINE -->
<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d", { willReadFrequently: true });
const img = document.getElementById("sourceImage");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pixels = [];

/* ================= IMAGE LOAD ================= */

img.onload = function(){

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const pixelSize = 2; // 🔥 MAX RÉSOLUTION

const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

ctx.clearRect(0,0,canvas.width,canvas.height);

/* ================= CREATE PIXELS ================= */

for(let y=0;y<canvas.height;y+=pixelSize){
for(let x=0;x<canvas.width;x+=pixelSize){

let index = (y*canvas.width + x)*4;

pixels.push({
x:x,
y:y,
r:data[index],
g:data[index+1],
b:data[index+2],
alpha:1,
vy:Math.random()*0.4
});

}
}

animate();

};

/* ================= ANIMATION LOOP ================= */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

pixels.forEach(p=>{

p.y += p.vy;
p.alpha -= 0.0004;

ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
ctx.fillRect(p.x,p.y,2,2);

});

requestAnimationFrame(animate);
}

</script>

</body>
</html>
