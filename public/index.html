<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etsy Money Finder</title>

<script src="/socket.io/socket.io.js"></script>

<style>

/* ===================================================== */
/* GLOBAL */
/* ===================================================== */

html, body{
  margin:0;
  padding:0;
  width:100%;
  min-height:100%;
  background:black;
  font-family:'Courier New', monospace;
  color:#00ff66;
  overflow-x:hidden;
}

/* ===================================================== */
/* MATRIX */
/* ===================================================== */

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  z-index:-1;
  pointer-events:none;
  background:black;
  display:block;
}

/* ===================================================== */
/* TITLE */
/* ===================================================== */

.title{
  text-align:center;
  font-size:42px;
  margin-top:40px;
  letter-spacing:4px;
  text-shadow:0 0 20px #00ff66;
}

/* ===================================================== */
/* CENTER */
/* ===================================================== */

.main-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;
  margin-top:40px;
  padding-bottom:80px;
}

/* ===================================================== */
/* SEARCH */
/* ===================================================== */

.search-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:15px;
}

#keyword, #limit{
  width:250px;
  padding:12px;
  border-radius:10px;
  border:2px solid #00ff66;
  background:black;
  color:#00ff66;
  text-align:center;
  outline:none;
}

/* ===================================================== */
/* START BUTTON */
/* ===================================================== */

.start-btn{
  background:#00ff66;
  color:black;
  border:none;
  padding:18px 50px;
  border-radius:40px;
  font-size:20px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 20px #00ff66;
}

.start-btn:hover{
  transform:scale(1.2);
  box-shadow:0 0 50px #00ff66;
}

/* ===================================================== */
/* LOADER */
/* ===================================================== */

.loader-container{
  display:none;
}

.loader{
  font-size:70px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}

/* ===================================================== */
/* RESULTS */
/* ===================================================== */

#results{
  width:90%;
  max-width:1200px;
  text-align:center;
}

.result-card{
  background:#111;
  border:1px solid #00ff66;
  border-radius:15px;
  padding:15px;
  margin:15px auto;
  transition:0.3s;
}

.result-card:hover{
  transform:scale(1.05);
  box-shadow:0 0 30px #00ff66;
}

.result-card img{
  width:180px;
  border-radius:10px;
}

.result-card a{
  color:#00ff66;
  text-decoration:none;
  font-weight:bold;
}

/* ===================================================== */
/* SCROLLBAR */
/* ===================================================== */

::-webkit-scrollbar{
  width:8px;
}

::-webkit-scrollbar-thumb{
  background:#00ff66;
  border-radius:10px;
}

::-webkit-scrollbar-track{
  background:black;
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<h1 class="title">Etsy Money Finder</h1>

<div class="main-center">

<div class="search-box">

<input type="text" id="keyword" placeholder="Keyword">

<select id="limit">
<option value="1">1</option>
<option value="10">10</option>
<option value="50">50</option>
<option value="100">100</option>
<option value="300">300</option>
</select>

<button class="start-btn" onclick="searchEtsy()">
🚀 START
</button>

</div>

<div class="loader-container" id="loader">
<div class="loader">🔥</div>
</div>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
