<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niche Finder</title>

<!-- 🔥 POLICE -->
<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="/socket.io/socket.io.js"></script>

</head>
<body>

<!-- ================= BACKGROUND ================= -->
<img src="/background.gif" class="gif-background">

<!-- ================= SMOKE ================= -->
<div class="smoke-container">
  <div class="smoke"></div>
  <div class="smoke"></div>
  <div class="smoke"></div>
</div>

<!-- ================= MAIN FORM ================= -->
<div class="container">

<h1 class="title">Niche Finder 🚀</h1>

<div id="credits">Credits: -</div>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown">
<option value="5">Analyse 5 annonces</option>
<option value="10">Analyse 10 annonces</option>
<option value="20">Analyse 20 annonces</option>
<option value="50">Analyse 50 annonces</option>
</select>

<button class="start-btn">START</button>

</div>

<!-- ================= LOGS ================= -->
<div class="logs" id="logs"></div>

</div>

<!-- ================= RESULTS ================= -->
<div id="results"></div>

<!-- ================= LOADER ================= -->
<div id="loader" class="loader hidden">
<div class="spinner"></div>
<p>Recherche en cours...</p>
</div>

<!-- ===================================================== -->
<!-- ================= SCRIPT ============================ -->
<!-- ===================================================== -->

<script>

/* ===================================================== */
/* TOKEN CHECK */
/* ===================================================== */

const token = localStorage.getItem("token");

if(!token){
alert("Tu dois te connecter !");
window.location.href="/login.html";
}

/* ===================================================== */
/* SOCKET CONNECTION */
/* ===================================================== */

const socket = io();
let socketId = null;

socket.on("connected",(data)=>{
socketId = data.socketId;
});

socket.on("log",(data)=>{
const logs = document.getElementById("logs");
logs.innerHTML += `<div class="log">${data.time} - ${data.message}</div>`;
logs.scrollTop = logs.scrollHeight;
});

/* ===================================================== */
/* LOAD USER INFO (CREDITS) */
/* ===================================================== */

async function loadUser(){

const res = await fetch("/me",{
headers:{
Authorization:"Bearer " + token
}
});

if(res.ok){
const data = await res.json();
document.getElementById("credits").innerText =
"Credits: " + data.credits;
}

}

loadUser();

/* ===================================================== */
/* SEARCH FUNCTION */
/* ===================================================== */

const startBtn = document.querySelector(".start-btn");
const resultsContainer = document.getElementById("results");
const loader = document.getElementById("loader");

startBtn.addEventListener("click", async () => {

const keyword = document.querySelector(".input-field").value;
const limit = document.querySelector(".dropdown").value;

if(!keyword){
alert("⚠️ Entre un keyword !");
return;
}

loader.classList.remove("hidden");
startBtn.disabled = true;
startBtn.innerText = "Loading...";

resultsContainer.innerHTML = "";

try {

const response = await fetch("/search-etsy", {
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer " + token
},
body:JSON.stringify({
keyword,
limit
})
});

const data = await response.json();

if(data.results && data.results.length > 0){

data.results.forEach(item => {

const card = document.createElement("div");
card.className = "result-card";

card.innerHTML = `
<img src="${item.image}">
<br>
<a href="${item.link}" target="_blank">Voir annonce</a>
`;

resultsContainer.appendChild(card);

});

} else {

resultsContainer.innerHTML = "<p>Aucun résultat trouvé.</p>";

}

} catch(error){
console.error(error);
alert("Erreur serveur ❌");
}

loader.classList.add("hidden");
startBtn.disabled = false;
startBtn.innerText = "START";

});

</script>

</body>
</html>
