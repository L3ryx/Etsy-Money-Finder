<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>

<!-- Police -->
<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background -->
<img src="/background.png" class="gif-background">

<!-- Smoke -->
<div class="smoke-container">
  <div class="smoke"></div>
  <div class="smoke"></div>
  <div class="smoke"></div>
</div>

<!-- Top right user button -->
<div class="user-btn-container">
  <button id="dashboard-btn">⚡ Mon compte</button>
</div>

<!-- Main centered form -->
<div class="container">
  <div class="form-container">
    <input type="text" class="input-field" placeholder="Keyword">
    <select class="dropdown">
      <!-- chiffres de 1 à 100 -->
      ${Array.from({length: 100}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('')}
    </select>
    <button class="start-btn">START</button>
  </div>
</div>

<!-- Results -->
<div id="results"></div>

<script src="index.js"></script>
</body>
</html>
