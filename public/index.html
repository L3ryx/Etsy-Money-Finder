<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etsy → AliExpress Finder</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
margin:0;
padding:30px;
}

h1{
text-align:center;
}

.search-box{
text-align:center;
margin-bottom:30px;
}

input{
padding:12px;
width:320px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
background:#ff6600;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#ff4500;
}

#loader{
display:none;
text-align:center;
margin-top:20px;
}

.results{
display:flex;
flex-wrap:wrap;
gap:25px;
justify-content:center;
margin-top:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
width:260px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:8px;
}

.card h3{
margin:10px 0 5px 0;
font-size:16px;
}

.card a{
display:block;
font-size:13px;
color:#1a73e8;
word-break:break-all;
text-decoration:none;
margin-bottom:10px;
}

.card a:hover{
text-decoration:underline;
}

</style>

</head>

<body>

<h1>Etsy → AliExpress Product Finder</h1>

<div class="search-box">

<input id="keyword" placeholder="ex: gold necklace">

<button id="searchBtn">
Analyser
</button>

</div>

<div id="loader">
Recherche en cours...
</div>

<div id="results" class="results"></div>

<script src="script.js"></script>

</body>
</html>
