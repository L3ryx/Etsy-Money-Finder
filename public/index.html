<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>

<style>

/* ================= FOND IMAGE ================= */

body{
background:url("/background.png") no-repeat center center fixed;
background-size:cover;
}

/* Option si tu veux un overlay sombre */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

</style>

</head>
<body>

<!-- ================= SMOKE (tu peux garder si tu veux) ================= -->
<div class="smoke-container">
  <div class="smoke"></div>
  <div class="smoke"></div>
  <div class="smoke"></div>
</div>

<div class="container">

<div id="credits">Credits: -</div>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown" id="limitDropdown">
</select>

<button class="start-btn">START</button>

</div>

<div class="logs" id="logs"></div>

</div>

<div id="results"></div>

<script>

/* ===================================================== */
/* TOKEN CHECK */
/* ===================================================== */

const token = localStorage.getItem("token");

if(!token){
window.location.href="/login.html";
}

/* ===================================================== */
/* DROPDOWN 1 → 100 */
/* ===================================================== */

const dropdown = document.getElementById("limitDropdown");

for(let i = 1; i <= 100; i++){
const option = document.createElement("option");
option.value = i;
option.textContent = `Analyse ${i} annonces`;
dropdown.appendChild(option);
}

/* ===================================================== */
/* SOCKET */
/* ===================================================== */

const socket = io();
let socketId = null;

socket.on("connected",(data)=>{
socketId = data.socketId;
});

socket.on("log",(data)=>{
const logs = document.getElementById("logs");
logs.innerHTML += `<div class="log">${data.time} - ${data.message}</div>`;
logs.scrollTop = logs.scrollHeight;
});

/* ===================================================== */
/* LOAD USER INFO */
/* ===================================================== */

async function loadUser(){

const res = await fetch("/me",{
headers:{
Authorization:"Bearer " + token
}
});

if(res.ok){
const data = await res.json();
document.getElementById("credits").innerText =
"Credits: " + data.credits;
}

}

loadUser();

/* ===================================================== */
/* SEARCH */
/* ===================================================== */

document.querySelector(".start-btn").addEventListener("click", async()=>{

const keyword = document.querySelector(".input-field").value;
const limit = dropdown.value;

if(!keyword){
alert("Entre un keyword !");
return;
}

document.getElementById("loader").classList.remove("hidden");

const res = await fetch("/search-etsy",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer " + token
},
body:JSON.stringify({
keyword,
limit,
socketId
})
});

const data = await res.json();

const resultsContainer = document.getElementById("results");
resultsContainer.innerHTML = "";

if(data.results){

data.results.forEach(item=>{

const card = document.createElement("div");
card.className = "result-card";

card.innerHTML = `
<img src="${item.image}">
<br>
<a href="${item.link}" target="_blank">Voir annonce</a>
`;

resultsContainer.appendChild(card);

});

}

document.getElementById("loader").classList.add("hidden");

});

</script>

</body>
</html>
