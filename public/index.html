<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niche Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- BACKGROUND IMAGE -->
<img src="/background.png" class="background-image">


<!-- USER BUTTON -->
<div class="top-bar">

<button id="userBtn" class="user-btn">
Espace utilisateur
</button>

</div>


<!-- MAIN TOOL -->
<div class="container">

<div class="form-container">

<input
type="text"
class="input-field"
placeholder="Keyword Etsy"
>

<select class="dropdown" id="limitSelect"></select>

<button class="start-btn">
START
</button>

</div>

</div>


<!-- RESULTS -->
<div id="results"></div>


<!-- LOADER -->
<div id="loader" class="loader hidden">

<div class="spinner"></div>
<p>Recherche en cours...</p>

</div>



<script>

/* ================= LIMIT DROPDOWN ================= */

const select = document.getElementById("limitSelect");

for(let i=1;i<=100;i++){

const option = document.createElement("option");

option.value = i;
option.textContent = "Analyse " + i + " annonces";

select.appendChild(option);

}


/* ================= LOGIN BUTTON ================= */

document.getElementById("userBtn").onclick = ()=>{

const token = localStorage.getItem("token");

if(token){
window.location.href="/dashboard.html";
}else{
window.location.href="/login.html";
}

};


/* ================= SEARCH ================= */

const startBtn = document.querySelector(".start-btn");
const results = document.getElementById("results");
const loader = document.getElementById("loader");

startBtn.addEventListener("click", async ()=>{

const keyword = document.querySelector(".input-field").value;
const limit = document.querySelector(".dropdown").value;

const token = localStorage.getItem("token");

if(!token){

alert("🔒 Connecte-toi pour lancer une recherche");

window.location.href="/login.html";

return;

}

if(!keyword){

alert("Entre un keyword");

return;

}


loader.classList.remove("hidden");
startBtn.disabled = true;

results.innerHTML = "";

try{

const res = await fetch("/search-etsy",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({
keyword,
limit
})

});


const data = await res.json();


if(data.results){

data.results.forEach(item=>{

const card = document.createElement("div");

card.className="result-card";

card.innerHTML = `

<img src="${item.image}">

<a href="${item.link}" target="_blank">
Voir annonce
</a>

`;

results.appendChild(card);

});

}else{

results.innerHTML="<p>Aucun résultat</p>";

}

}catch(err){

alert("Erreur serveur");

}


loader.classList.add("hidden");
startBtn.disabled=false;

});

</script>

</body>
</html>
