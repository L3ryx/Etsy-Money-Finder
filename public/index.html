<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etsy → AliExpress Finder</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    form {
      display: flex;
      justify-content: center;
      margin-bottom: 30px;
    }

    input[type="text"] {
      width: 300px;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 5px 0 0 5px;
      outline: none;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      border: none;
      background-color: #4CAF50;
      color: white;
      cursor: pointer;
      border-radius: 0 5px 5px 0;
    }

    button:hover {
      background-color: #45a049;
    }

    #results {
      display: flex;
      flex-direction: column;
      gap: 40px;
    }

    .etsy-item {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .etsy-item img {
      max-width: 200px;
      border-radius: 5px;
      margin-bottom: 10px;
    }

    .aliexpress-results {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .ali-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #fafafa;
      padding: 10px;
      border-radius: 5px;
      width: 120px;
    }

    .ali-item img {
      border-radius: 5px;
      margin-bottom: 5px;
    }

    .ali-item p {
      font-size: 12px;
      color: #555;
      margin: 0;
      text-align: center;
    }

    a {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>Etsy → AliExpress Finder</h1>

  <form id="searchForm">
    <input type="text" id="query" placeholder="Rechercher un produit sur Etsy..." required>
    <button type="submit">Chercher</button>
  </form>

  <div id="results">
    <!-- Les résultats s'afficheront ici -->
  </div>

  <script src="script.js"></script>
</body>
</html>
