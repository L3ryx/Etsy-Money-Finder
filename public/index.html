<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niche Finder</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="sky">

<!-- ⭐ STARS -->
<div class="star" style="width:4px;height:4px;top:60px;left:100px;"></div>
<div class="star" style="width:3px;height:3px;top:200px;left:300px;"></div>
<div class="star" style="width:5px;height:5px;top:350px;left:600px;"></div>
<div class="star" style="width:3px;height:3px;top:150px;left:800px;"></div>

<!-- 🌠 SHOOTING STAR -->
<div class="shooting-star"></div>

<!-- 🔥 TITLE -->
<h1 class="title">Niche Finder</h1>

<!-- 🎯 FORM -->
<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown">
<option value="5">Analyse 5 annonces</option>
<option value="10">Analyse 10 annonces</option>
<option value="20">Analyse 20 annonces</option>
<option value="50">Analyse 50 annonces</option>
</select>

<button class="start-btn">
START
</button>

</div>

<!-- 🏠 DOGHOUSE -->
<div class="doghouse">
<div class="roof"></div>
<div class="door"></div>
</div>

<!-- 🐕 DOG -->
<div class="dog"></div>

<!-- 🌿 GROUND -->
<div class="ground"></div>

<!-- 💵 MONEY RAIN -->
<div class="money" style="left:40%">💵</div>
<div class="money" style="left:50%">💵</div>
<div class="money" style="left:60%">💵</div>

</div>

</body>
</html>
