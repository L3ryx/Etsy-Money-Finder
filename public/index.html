<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niche Finder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 🐕 LOADING DOG -->
<div class="loader-dog">🐕</div>

<div class="sky">

<!-- 🔥 TITLE -->
<h1 class="title">Niche Finder</h1>

<!-- 🎯 FORM -->
<div class="form-container">

<input type="text" id="keyword" class="input-field" placeholder="Keyword">

<select id="limit" class="dropdown">
<option value="5">Analyse 5 annonces</option>
<option value="10">Analyse 10 annonces</option>
<option value="20">Analyse 20 annonces</option>
<option value="50">Analyse 50 annonces</option>
</select>

<button class="start-btn" onclick="startSearch()">
START
</button>

</div>

<!-- 📦 RESULTS -->
<div id="results"></div>

<!-- 🌿 GRASS -->
<div class="grass"></div>

</div>

<script>

/* 🔎 SEARCH */

async function startSearch(){

const keyword = document.getElementById("keyword").value;
const limit = document.getElementById("limit").value;

if(!keyword){
alert("Enter keyword");
return;
}

const res = await fetch("/search-etsy",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({keyword,limit})
});

const data = await res.json();

displayResults(data.results);

}

/* 📦 DISPLAY RESULTS */

function displayResults(results){

const container = document.getElementById("results");
container.innerHTML = "";

if(!results) return;

results.forEach(item => {

const card = document.createElement("div");
card.className = "result-card";

card.innerHTML = `
<img src="${item.image}" />
<br>
<a href="${item.link}" target="_blank">
Open Listing
</a>
`;

container.appendChild(card);

});

}

/* 🐕 REMOVE LOADER AFTER LOAD */

window.addEventListener("load",()=>{

document.querySelector(".loader-dog").style.display="none";

});

</script>

</body>
</html>
