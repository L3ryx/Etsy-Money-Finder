<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<title>Etsy Finder</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
text-align:center;
}

.container{
background:white;
padding:30px;
border-radius:10px;
max-width:900px;
margin:auto;
}

input{
padding:10px;
margin:5px;
width:200px;
}

button{
padding:10px 20px;
margin:5px;
cursor:pointer;
}

#results{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:20px;
margin-top:30px;
justify-content:center;
}

.product{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}

.product img{
width:100%;
border-radius:8px;
}

</style>

</head>

<body>

<div class="container">

<h1>Etsy Product Finder</h1>

<h3>Tokens disponibles : <span id="tokens">0</span></h3>

<hr>

<h2>Créer un compte</h2>

<input id="registerEmail" placeholder="Email">
<input id="registerPassword" type="password" placeholder="Password">

<br>

<button onclick="register()">Register</button>

<hr>

<h2>Connexion</h2>

<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">

<br>

<button onclick="login()">Login</button>

<hr>

<h2>Acheter une recherche</h2>

<button onclick="buySearch()">Acheter 1 recherche (0,50€)</button>

<hr>

<h2>Recherche Etsy</h2>

<input id="keyword" placeholder="Mot clé">
<input id="limit" placeholder="Nombre" value="10">

<br>

<button onclick="search()">Rechercher</button>

<div id="results"></div>

</div>

<script>

let token = localStorage.getItem("token");

async function register(){

const email = document.getElementById("registerEmail").value
const password = document.getElementById("registerPassword").value

const res = await fetch("/register",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({email,password})
})

const data = await res.json()

alert(data.message)

}

async function login(){

const email = document.getElementById("loginEmail").value
const password = document.getElementById("loginPassword").value

const res = await fetch("/login",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({email,password})
})

const data = await res.json()

token = data.token

localStorage.setItem("token",token)

loadDashboard()

}

async function loadDashboard(){

if(!token) return

const res = await fetch("/dashboard",{
headers:{
Authorization:"Bearer "+token
}
})

const data = await res.json()

document.getElementById("tokens").innerText = data.tokens

}

async function buySearch(){

const res = await fetch("/create-payment",{
method:"POST",
headers:{
Authorization:"Bearer "+token
}
})

const data = await res.json()

window.location = data.url

}

async function search(){

const keyword = document.getElementById("keyword").value
const limit = document.getElementById("limit").value

const res = await fetch("/search-etsy",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({keyword,limit})
})

const data = await res.json()

if(data.message){
alert(data.message)
return
}

displayResults(data.results)

loadDashboard()

}

function displayResults(products){

const container = document.getElementById("results")

container.innerHTML=""

products.forEach(p=>{

const div=document.createElement("div")

div.className="product"

div.innerHTML=`

<img src="${p.image}">

<br><br>

<a href="${p.link}" target="_blank">Voir produit</a>

<br><br>

<button onclick="saveProduct('${p.image}','${p.link}')">
Sauvegarder
</button>

`

container.appendChild(div)

})

}

async function saveProduct(image,link){

await fetch("/save-product",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({image,link})
})

alert("Produit sauvegardé")

}

loadDashboard()

</script>

</body>
</html>
