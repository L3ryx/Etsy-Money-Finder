<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

</head>
<body>

<!-- ================= BUY BUTTON TOP LEFT ================= -->

<div style="position:fixed;top:20px;left:20px;z-index:9999;">
<button onclick="window.location='/dashboard'"
style="
background:yellow;
padding:12px 25px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
">
💵 BUY
</button>
</div>

<!-- ================= BACKGROUND ================= -->

<img src="/background.gif" class="gif-background">

<div class="smoke-container">
<div class="smoke"></div>
<div class="smoke"></div>
<div class="smoke"></div>
</div>

<!-- ================= MAIN CONTENT ================= -->

<div class="container">

<h1 class="title">Niche Finder</h1>

<!-- 🔥 TEXTE AJOUTÉ -->
<p style="
font-size:24px;
margin-top:15px;
font-weight:bold;
background:linear-gradient(90deg,#00e676,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
">
Les niches n'ont plus de secrets !
</p>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown">
<option value="5">Analyse 5 annonces</option>
<option value="10">Analyse 10 annonces</option>
<option value="20">Analyse 20 annonces</option>
<option value="50">Analyse 50 annonces</option>
</select>

<button class="start-btn">START</button>

</div>
</div>

<!-- ================= RESULTS ================= -->

<div id="results"></div>

<!-- ================= LOADER ================= -->

<div id="loader" class="loader hidden">
<div class="spinner"></div>
<p>Recherche en cours...</p>
</div>

<!-- ================= SCRIPT ================= -->

<script>

const startBtn = document.querySelector(".start-btn");
const resultsContainer = document.getElementById("results");
const loader = document.getElementById("loader");

startBtn.addEventListener("click", async () => {

const keyword = document.querySelector(".input-field").value;
const limit = document.querySelector(".dropdown").value;

if(!keyword){
alert("⚠️ Entre un keyword !");
return;
}

const token = localStorage.getItem("token");

if(!token){
alert("Connecte-toi d'abord !");
window.location="/login";
return;
}

loader.classList.remove("hidden");
startBtn.disabled = true;
startBtn.innerText = "Loading...";

try {

const response = await fetch("/search-etsy", {
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
keyword,
limit
})
});

const data = await response.json();

resultsContainer.innerHTML = "";

if(data.results && data.results.length > 0){

data.results.forEach(item => {

const card = document.createElement("div");
card.className = "result-card";

card.innerHTML = `
<img src="${item.image}">
<br>
<a href="${item.link}" target="_blank">Voir annonce</a>
`;

resultsContainer.appendChild(card);

});

}else{
resultsContainer.innerHTML = "<p>Aucun résultat trouvé.</p>";
}

}catch(error){
console.log(error);
alert("Erreur serveur ❌");
}

loader.classList.add("hidden");
startBtn.disabled = false;
startBtn.innerText = "START";

});

</script>

</body>
</html>
