<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etsy Money Finder</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
  overflow:hidden;
}

/* MATRIX */

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* TITLE */

.title{
  text-align:center;
  margin-top:30px;
  font-size:32px;
}

/* CENTER */

.main-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:40px;
}

/* INPUT */

input, select{
  padding:8px;
  border-radius:8px;
  border:none;
}

/* START BUTTON */

.start-btn{
  background:#00ff66;
  border:none;
  padding:6px 16px;
  border-radius:20px;
  font-weight:bold;
  cursor:pointer;
}

/* PROGRESS */

.loading-container{
  width:60%;
  height:25px;
  background:#111;
  border-radius:20px;
  margin-top:20px;
  overflow:hidden;
}

.flame-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, red, orange, yellow);
  transition:width 0.3s ease;
  position:relative;
}

.flame-bar::after{
  content:"🔥";
  position:absolute;
  right:-8px;
  top:-8px;
  animation:flame 0.5s infinite alternate;
}

@keyframes flame{
  from{ transform:scale(1);}
  to{ transform:scale(1.4);}
}

/* RESULTS */

#results{
  margin-top:20px;
  text-align:center;
}

.result-card{
  background:#111;
  padding:15px;
  margin:10px;
  border-radius:10px;
}

.result-card a{
  color:#00ffcc;
  text-decoration:none;
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<h1 class="title">Etsy Money Finder</h1>

<div class="main-center">

<div>

<input type="text" id="keyword" placeholder="Keyword">

<select id="limit">
<option value="10">10</option>
<option value="50">50</option>
<option value="100">100</option>
</select>

<button class="start-btn" onclick="searchEtsy()">
🚀 START
</button>

</div>

<div class="loading-container">
<div class="flame-bar" id="progressBar"></div>
</div>

<div id="results"></div>

</div>

<script>

const socket = io();
let progress = 0;
const progressBar = document.getElementById("progressBar");
let socketId = null;

/* SOCKET CONNECTION */

socket.on("connected", data => {
  socketId = data.socketId;
});

/* 🔥 REAL PROGRESS FROM SERVER */

socket.on("progress", data => {

  progress = data.percent;

  if(progress > 100) progress = 100;

  progressBar.style.width = progress + "%";
});

/* SEARCH */

async function searchEtsy(){

  progressBar.style.width = "10%";

  const keyword = document.getElementById("keyword").value;
  const limit = document.getElementById("limit").value;

  const response = await fetch("/search-etsy", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      keyword,
      limit,
      socketId
    })
  });

  const data = await response.json();

  displayResults(data.results);
}

/* RESULTS */

function displayResults(results){

  const container = document.getElementById("results");
  container.innerHTML = "";

  if(!results || results.length === 0){
    container.innerHTML = "<h3>No results found</h3>";
    return;
  }

  results.forEach(item => {

    const card = document.createElement("div");
    card.className = "result-card";

    card.innerHTML = `
      🔗 <a href="${item.link}" target="_blank">
        Open Listing
      </a>
    `;

    container.appendChild(card);

  });
}

/* MATRIX */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "010101ETSYMONEYFINDER";
const fontSize = 16;

let columns = canvas.width / fontSize;
let drops = [];

for(let i = 0; i < columns; i++){
  drops[i] = 1;
}

let speed = 50;
let interval = setInterval(draw, speed);

function setSpeed(newSpeed){
  speed = newSpeed;
  clearInterval(interval);
  interval = setInterval(draw, speed);
}

function draw(){

  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for(let i=0;i<drops.length;i++){

    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

/* ACCELERATE MATRIX DURING SCRAP */

socket.on("progress", data => {

  if(data.percent < 50){
    setSpeed(20);  // 🔥 rapide
  } else {
    setSpeed(50);  // normal
  }

});

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

</script>

</body>
</html>
