<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>

<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/style.css">

</head>
<body>

<!-- 🔴 POPUP BLOQUANT OBLIGATOIRE -->

<div id="authPopup" style="
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(15px);
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
">

<div style="
background:white;
padding:40px;
border-radius:20px;
width:400px;
text-align:center;
">

<h2>Accès obligatoire</h2>

<p style="margin-bottom:15px;">
Crée un compte pour accéder à l'outil.
</p>

<input type="email" id="email" placeholder="Email"
style="width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc;">

<input type="password" id="password" placeholder="Mot de passe"
style="width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #ccc;">

<button onclick="registerUser()"
style="
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:10px;
">
Créer compte
</button>

</div>

</div>

<!-- ================= USER BUTTON ================= -->

<div style="position:fixed;top:20px;right:20px;z-index:999;">
<button onclick="openPopup()"
style="
background:white;
border:none;
width:50px;
height:50px;
border-radius:50%;
font-size:20px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
">
👤
</button>
</div>

<!-- ================= MAIN CONTENT ================= -->

<img src="/background.gif" class="gif-background">

<div class="smoke-container">
<div class="smoke"></div>
<div class="smoke"></div>
<div class="smoke"></div>
</div>

<div class="container">

<h1 class="title">Niche Finder</h1>

<p style="
font-size:24px;
margin-top:15px;
font-weight:bold;
background:linear-gradient(90deg,#00e676,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
">
Les niches n'ont plus de secrets !
</p>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown">
<option value="5">Analyse 5 annonces</option>
<option value="10">Analyse 10 annonces</option>
<option value="20">Analyse 20 annonces</option>
<option value="50">Analyse 50 annonces</option>
</select>

<button class="start-btn">START</button>

</div>
</div>

<!-- ================= RESULTS ================= -->

<div id="results"></div>

<!-- ================= LOADER ================= -->

<div id="loader" class="loader hidden">
<div class="spinner"></div>
<p>Recherche en cours...</p>
</div>

<!-- ================= SCRIPT ================= -->

<script>

/* 🔥 OUVRIR POPUP MANUELLEMENT */

function openPopup(){
document.getElementById("authPopup").style.display="flex";
}

/* 🔥 INSCRIPTION */

async function registerUser(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(res.ok){

alert("Compte créé ✅");

// 🔥 Redirection vers paiement obligatoire
window.location="/payment";

}else{
alert(data.message);
}

}

/* ================= SEARCH ================= */

const startBtn = document.querySelector(".start-btn");
const resultsContainer = document.getElementById("results");
const loader = document.getElementById("loader");

startBtn.addEventListener("click", async () => {

const keyword = document.querySelector(".input-field").value;
const limit = document.querySelector(".dropdown").value;

const token = localStorage.getItem("token");

if(!token){
alert("Connecte-toi !");
openPopup();
return;
}

loader.classList.remove("hidden");
startBtn.innerText = "Loading...";

const res = await fetch("/search-etsy",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({keyword,limit})
});

const data = await res.json();

resultsContainer.innerHTML="";

if(data.results){

data.results.forEach(item=>{

resultsContainer.innerHTML += `
<div class="result-card">
<img src="${item.image}" width="200">
<br>
<a href="${item.link}" target="_blank">Voir annonce</a>
</div>
`;

});

}else{
alert(data.message || "Erreur");
}

loader.classList.add("hidden");
startBtn.innerText="START";

});

</script>

</body>
</html>
