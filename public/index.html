<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Game</title>

<style>

body{
  margin:0;
  overflow:hidden;
  background:black;
  font-family:Arial;
  color:white;
}

canvas{
  display:block;
}

.ui{
  position:fixed;
  top:20px;
  width:100%;
  text-align:center;
  font-size:40px;
  color:red;
  text-shadow:0 0 20px red;
}

</style>
</head>
<body>

<div class="ui">🐕 NICHE GAME 💰</div>

<canvas id="game"></canvas>

<script>

/* ================= SETUP ================= */

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

/* ================= WORLD ================= */

const groundY = canvas.height - 150;
const niche = { x: canvas.width/2 - 80, y: groundY - 100, w:160, h:120 };

/* ================= DOG CLASS ================= */

class Dog{

  constructor(direction){

    this.x = direction === "left" ? -100 : canvas.width + 100;
    this.y = groundY - 50;
    this.size = 60;
    this.speed = direction === "left" ? 3 : -3;
    this.velocityY = 0;
    this.gravity = 0.8;
    this.jumping = false;
  }

  update(){

    this.x += this.speed;

    // Jump before niche
    if(!this.jumping && Math.abs(this.x - niche.x) < 200){
      this.velocityY = -15;
      this.jumping = true;
    }

    // Gravity
    this.velocityY += this.gravity;
    this.y += this.velocityY;

    // Ground collision
    if(this.y >= groundY - 50){
      this.y = groundY - 50;
      this.velocityY = 0;
      this.jumping = false;
    }
  }

  draw(){
    ctx.font = "60px Arial";
    ctx.fillText("🐕", this.x, this.y);
  }

  checkNiche(){

    if(
      this.x > niche.x &&
      this.x < niche.x + niche.w &&
      this.y > niche.y
    ){
      spawnMoneyExplosion(this.x, this.y);
      return true;
    }

    return false;
  }

}

/* ================= MONEY PARTICLES ================= */

class MoneyParticle{

  constructor(x,y){

    this.x = x;
    this.y = y;
    this.vx = (Math.random()-0.5)*8;
    this.vy = -Math.random()*10;
    this.alpha = 1;
  }

  update(){

    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.5;
    this.alpha -= 0.02;
  }

  draw(){

    ctx.globalAlpha = this.alpha;
    ctx.font = "30px Arial";
    ctx.fillText("$", this.x, this.y);
    ctx.globalAlpha = 1;
  }
}

/* ================= SYSTEM ================= */

let dogs = [];
let particles = [];

/* Spawn dogs */

setInterval(()=>{
  const dir = Math.random() > 0.5 ? "left" : "right";
  dogs.push(new Dog(dir));
},2000);

/* Spawn money explosion */

function spawnMoneyExplosion(x,y){

  for(let i=0;i<20;i++){
    particles.push(new MoneyParticle(x,y));
  }
}

/* ================= GAME LOOP ================= */

function drawGround(){

  ctx.fillStyle = "#2ecc71";
  ctx.fillRect(0,groundY,canvas.width,200);

  // Niche
  ctx.font = "120px Arial";
  ctx.fillText("🏠", niche.x, niche.y);
}

function animate(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  drawGround();

  dogs = dogs.filter(dog => {

    dog.update();
    dog.draw();

    if(dog.checkNiche()){
      return false;
    }

    return true;

  });

  particles = particles.filter(p => {
    p.update();
    p.draw();
    return p.alpha > 0;
  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
