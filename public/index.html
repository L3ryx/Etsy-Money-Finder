<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niche Finder</title>

<!-- 🔥 POLICE CROISSANT ONE -->
<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🎬 GIF BACKGROUND -->
<img src="/background.gif" class="gif-background" alt="background">

<!-- 🔥 CONTENU -->
<div class="container">

<h1 class="title">Niche Finder</h1>

<div class="form-container">

<!-- Keyword -->
<input type="text" class="input-field" placeholder="Keyword">

<!-- Dropdown -->
<select class="dropdown">
<option value="5">Analyse 5 annonces</option>
<option value="10">Analyse 10 annonces</option>
<option value="20">Analyse 20 annonces</option>
<option value="50">Analyse 50 annonces</option>
</select>

<!-- Button -->
<button class="start-btn">START</button>

</div>

</div>

<!-- 🚀 SCRIPT FONCTIONNEL DU BOUTON -->
<script>

const startBtn = document.querySelector(".start-btn");

startBtn.addEventListener("click", function() {

const keyword = document.querySelector(".input-field").value;
const limit = document.querySelector(".dropdown").value;

alert("START cliqué ✅");

console.log("Keyword :", keyword);
console.log("Limit :", limit);

});

</script>

</body>
</html>
