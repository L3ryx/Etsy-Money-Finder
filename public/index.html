<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="/socket.io/socket.io.js"></script>

</head>
<body>

<!-- ================= USER BUTTON ================= -->
<div class="user-btn" id="userButton" onclick="goDashboard()">
👤 Connexion
</div>

<!-- ================= BACKGROUND ================= -->
<img src="/background.png" class="gif-background">

<!-- ================= SMOKE ================= -->
<div class="smoke-container">
<div class="smoke"></div>
<div class="smoke"></div>
<div class="smoke"></div>
</div>

<!-- ================= MAIN ================= -->
<div class="container">

<div id="credits">Credits: -</div>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown" id="limitDropdown"></select>

<button class="start-btn">START</button>

</div>

<div class="logs" id="logs"></div>

</div>

<!-- ================= RESULTS ================= -->
<div id="results"></div>

<!-- ================= LOADER ================= -->
<div id="loader" class="loader hidden">
<div class="spinner"></div>
<p>Recherche en cours...</p>
</div>

<!-- ===================================================== -->
<!-- ================= SCRIPT ============================ -->
<!-- ===================================================== -->

<script>

/* ===================================================== */
/* TOKEN CHECK */
/* ===================================================== */

const token = localStorage.getItem("token");

if(!token){
document.getElementById("credits").innerText = "Non connecté";
}

/* ===================================================== */
/* USER BUTTON */
/* ===================================================== */

const userBtn = document.getElementById("userButton");

if(token){

fetch("/me",{
headers:{
Authorization:"Bearer " + token
}
})
.then(res => res.json())
.then(data => {

if(data.email){
userBtn.innerText = "👤 " + data.email;
document.getElementById("credits").innerText =
"Credits: " + data.credits;
}

})
.catch(()=>{});

}

function goDashboard(){

if(token){
window.location.href="/dashboard.html";
}else{
window.location.href="/login.html";
}

}

/* ===================================================== */
/* DROPDOWN 1 → 100 */
/* ===================================================== */

const dropdown = document.getElementById("limitDropdown");

for(let i=1;i<=100;i++){

const option = document.createElement("option");
option.value = i;
option.textContent = `Analyse ${i} annonces`;
dropdown.appendChild(option);

}

/* ===================================================== */
/* SOCKET LOGS */
/* ===================================================== */

const socket = io();
let socketId = null;

socket.on("connected",(data)=>{
socketId = data.socketId;
});

socket.on("log",(data)=>{

const logs = document.getElementById("logs");
logs.innerHTML += `<div class="log">${data.time} - ${data.message}</div>`;
logs.scrollTop = logs.scrollHeight;

});

/* ===================================================== */
/* SEARCH */
/* ===================================================== */

document.querySelector(".start-btn").addEventListener("click", async()=>{

const token = localStorage.getItem("token");

if(!token){
alert("🔒 Tu dois être connecté !");
window.location.href="/login.html";
return;
}

const keyword = document.querySelector(".input-field").value;
const limit = dropdown.value;

if(!keyword){
alert("Entre un keyword !");
return;
}

document.getElementById("loader").classList.remove("hidden");

const res = await fetch("/search-etsy",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer " + token
},
body:JSON.stringify({
keyword,
limit,
socketId
})
});

const data = await res.json();

const resultsContainer = document.getElementById("results");
resultsContainer.innerHTML = "";

if(data.results && data.results.length > 0){

data.results.forEach(item=>{

const card = document.createElement("div");
card.className = "result-card";

card.innerHTML = `
<img src="${item.image}">
<br>
<a href="${item.link}" target="_blank">Voir annonce</a>
`;

resultsContainer.appendChild(card);

});

}else{
resultsContainer.innerHTML = "<p>Aucun résultat trouvé.</p>";
}

document.getElementById("loader").classList.add("hidden");

});

</script>

</body>
</html>
