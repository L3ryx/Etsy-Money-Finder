<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Niche Finder</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sky">

<div class="stars"></div>

<!-- 🔥 TITLE -->

<h1 class="title">Niche Finder</h1>

<!-- 🎯 FORM -->

<div class="form-container">

<input 
type="text" 
id="keyword" 
class="input-field" 
placeholder="Keyword">

<!-- 🔢 Nombre d'annonces à analyser -->

<select id="limit" class="dropdown">
<option value="5">Analyser 5 annonces</option>
<option value="10">Analyser 10 annonces</option>
<option value="20">Analyser 20 annonces</option>
<option value="50">Analyser 50 annonces</option>
</select>

<!-- 🚀 START BUTTON -->

<button class="start-btn" onclick="startSearch()">
START
</button>

</div>

<!-- 🌍 SCENE ANIMATION -->

<div class="scene">

<div class="doghouse">🏠</div>
<div class="dog">🐕</div>

<div class="money m1">💵</div>
<div class="money m2">💵</div>
<div class="money m3">💵</div>
<div class="money m4">💵</div>
<div class="money m5">💵</div>

</div>

<div class="grass"></div>

<!-- 🔎 RESULTS -->

<div id="results"></div>

</div>

<script>

/* ============================= */
/* SEARCH FUNCTION */
/* ============================= */

async function startSearch(){

const keyword = document.getElementById("keyword").value;
const limit = document.getElementById("limit").value;

if(!keyword){
alert("Enter a keyword !");
return;
}

const res = await fetch("/search-etsy", {
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
keyword: keyword,
limit: limit
})
});

const data = await res.json();

displayResults(data.results);

}

/* ============================= */
/* DISPLAY RESULTS */
/* ============================= */

function displayResults(results){

const container = document.getElementById("results");
container.innerHTML = "";

if(!results) return;

results.forEach(item => {

const card = document.createElement("div");
card.className = "result-card";

card.innerHTML = `
<img src="${item.image}" />
<br>
<a href="${item.link}" target="_blank">
Open Listing
</a>
`;

container.appendChild(card);

});

}

</script>

</body>
</html>
