<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etsy Money Finder</title>

<script src="/socket.io/socket.io.js"></script>

<style>

/* ================= GLOBAL ================= */

body{
  margin:0;
  background:black;
  font-family: "Courier New", monospace;
  color:#00ff66;
  overflow:auto; /* ✅ SCROLL ACTIVÉ */
}

/* ================= MATRIX ================= */

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ================= TITLE HACKER STYLE ================= */

.title{
  text-align:center;
  font-size:42px;
  margin-top:40px;
  font-weight:bold;
  text-shadow:0 0 10px #00ff66;
}

/* ================= CENTER ================= */

.main-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:50px;
}

/* ================= SEARCH VERTICAL ================= */

.search-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:18px;
  margin-top:20px;
}

.input-field{
  padding:12px;
  width:260px;
  border-radius:10px;
  border:none;
  text-align:center;
  font-size:16px;
}

.select-field{
  padding:12px;
  width:260px;
  border-radius:10px;
  border:none;
  text-align:center;
  font-size:16px;
}

/* ================= START BUTTON BIG ================= */

.start-btn{
  background:#00ff66;
  border:none;
  padding:15px 60px;
  border-radius:40px;
  font-size:22px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
  box-shadow:0 0 20px #00ff66;
}

.start-btn:hover{
  transform:scale(1.2);
  box-shadow:0 0 40px #00ff66;
}

/* ================= LOADER ================= */

.loader{
  margin-top:20px;
  font-size:40px;
  animation:spin 1s linear infinite;
  display:none;
}

@keyframes spin{
  from{ transform:rotate(0deg); }
  to{ transform:rotate(360deg); }
}

/* ================= RESULTS ================= */

#results{
  margin-top:30px;
  width:80%;
  text-align:center;
}

.result-card{
  background:#111;
  padding:15px;
  border-radius:15px;
  margin:15px 0;
}

.result-card a{
  color:#00ffcc;
  text-decoration:none;
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<h1 class="title">Etsy Money Finder</h1>

<div class="main-center">

<div class="search-box">

<input type="text" id="keyword" placeholder="Keyword" class="input-field">

<select id="limit" class="select-field">
<option value="1">1</option>
<option value="10">10</option>
<option value="50">50</option>
<option value="100">100</option>
<option value="300">300</option>
</select>

<button onclick="searchEtsy()" class="start-btn">
🚀 START
</button>

</div>

<div class="loader" id="loader">🔥</div>

<div id="results"></div>

</div>

<script>

const socket = io();
const loader = document.getElementById("loader");

/* ================= SEARCH ================= */

async function searchEtsy(){

  loader.style.display = "block";

  const keyword = document.getElementById("keyword").value;
  const limit = document.getElementById("limit").value;

  const response = await fetch("/search-etsy", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ keyword, limit })
  });

  const data = await response.json();

  loader.style.display = "none";

  displayResults(data.results);
}

/* ================= RESULTS ================= */

function displayResults(results){

  const container = document.getElementById("results");
  container.innerHTML = "";

  if(!results || results.length === 0){
    container.innerHTML = "<h3>No results found</h3>";
    return;
  }

  results.forEach(item => {

    const card = document.createElement("div");
    card.className = "result-card";

    card.innerHTML = `
      <img src="${item.image}" width="180"><br><br>
      🔗 <a href="${item.link}" target="_blank">
      Open Listing
      </a>
    `;

    container.appendChild(card);

  });
}

/* ================= MATRIX ================= */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "010101HACKERETSYFINDER";
const fontSize = 16;

let columns = canvas.width / fontSize;
let drops = [];

for(let i = 0; i < columns; i++){
  drops[i] = 1;
}

function drawMatrix(){

  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++){

    const text = letters[Math.floor(Math.random()*letters.length)];
    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

setInterval(drawMatrix, 50);

/* RESIZE */

window.addEventListener("resize", () => {

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
