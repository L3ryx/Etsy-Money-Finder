<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etsy Finder</title>

<link rel="stylesheet" href="style.css">
<script src="/socket.io/socket.io.js"></script>

<style>

/* ================= TITLE ================= */

.title{
  text-align:center;
  color:white;
  font-size:30px;
  margin-top:20px;
}

/* ================= SEARCH BOX ================= */

.main-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:40px;
}

.search-box{
  display:flex;
  gap:10px;
  align-items:center;
}

/* ================= INPUT ================= */

input, select{
  padding:8px;
  border-radius:8px;
  border:none;
}

/* ================= START BUTTON ================= */

.start-btn{
  background:#00ff66;
  border:none;
  padding:6px 18px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.start-btn:hover{
  transform:scale(1.1);
}

/* ================= LOADING BAR ================= */

.loading-container{
  width:60%;
  height:25px;
  background:#111;
  border-radius:20px;
  margin-top:20px;
  overflow:hidden;
  position:relative;
}

/* Barre rouge / orange */

.flame-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, red, orange, yellow);
  transition:width 0.5s ease;
  position:relative;
}

/* 🔥 FLAME EFFECT */

.flame-bar::after{
  content:"🔥";
  position:absolute;
  right:-8px;
  top:-8px;
  font-size:20px;
  animation:flameAnim 0.5s infinite alternate;
}

@keyframes flameAnim{
  from{ transform:scale(1);}
  to{ transform:scale(1.4);}
}

#results{
  margin-top:20px;
  color:white;
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<h1 class="title">Etsy Money Finder</h1>

<div class="main-center">

<!-- SEARCH MODULE -->

<div class="search-box">

<input type="text" id="keyword" placeholder="Keyword">

<select id="limit">
<option value="1">1</option>
<option value="10">10</option>
<option value="50">50</option>
<option value="100">100</option>
<option value="300">300</option>
</select>

<!-- ✅ BUTTON CHANGÉ ICI -->

<button onclick="searchEtsy()" class="start-btn">
🚀 START
</button>

</div>

<!-- LOADING BAR -->

<div class="loading-container">
<div class="flame-bar" id="progressBar"></div>
</div>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
