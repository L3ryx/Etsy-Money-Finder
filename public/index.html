<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<!-- ✅ MOBILE OPTIMISATION -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">

<title>Etsy Money Finder</title>

<script src="/socket.io/socket.io.js"></script>

<style>

/* ===================================================== */
/* GLOBAL */
/* ===================================================== */

html, body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow-x:hidden;
  overflow-y:auto;
  background:black;
  font-family:"Courier New", monospace;
  color:#00ff66;
  -webkit-text-size-adjust:100%;
  overscroll-behavior:none;
}

/* ===================================================== */
/* MATRIX */
/* ===================================================== */

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  z-index:-1;
  background:black;
  pointer-events:none;
  display:block;
}

/* ===================================================== */
/* TITLE GLITCH */
/* ===================================================== */

.title{
  text-align:center;
  font-size:55px;
  margin-top:50px;
  letter-spacing:5px;
  position:relative;
  text-shadow:0 0 15px #00ff66;
}

/* ===================================================== */
/* SEARCH BOX */
/* ===================================================== */

.main-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:40px;
  padding-bottom:100px;
}

.search-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:25px;

  backdrop-filter:blur(25px);
  background:rgba(0,255,102,0.05);
  padding:50px;
  border-radius:35px;
  border:1px solid rgba(0,255,102,0.3);
  box-shadow:0 0 60px rgba(0,255,102,0.2);
}

input, select{
  width:300px;
  padding:15px;
  border-radius:20px;
  border:2px solid #00ff66;
  background:black;
  color:#00ff66;
  text-align:center;
  font-size:16px;
  outline:none;
}

/* ===================================================== */
/* START BUTTON */
/* ===================================================== */

.start-btn{
  position:relative;
  background:#00ff66;
  color:black;
  border:none;
  padding:25px 100px;
  border-radius:60px;
  font-size:24px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 50px #00ff66;
  transition:0.3s;
}

.start-btn:hover{
  transform:scale(1.15);
}

/* ===================================================== */
/* LOADER */
/* ===================================================== */

.loader-container{
  display:none;
  margin-top:20px;
}

.loader{
  font-size:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  from{ transform:rotate(0deg);}
  to{ transform:rotate(360deg);}
}

/* ===================================================== */
/* RESULTS GRID */
/* ===================================================== */

#results{
  width:95%;
  max-width:1400px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:30px;
  justify-items:center;
}

.result-card{
  backdrop-filter:blur(20px);
  background:rgba(0,255,102,0.05);
  border:1px solid rgba(0,255,102,0.4);
  border-radius:30px;
  padding:30px;
  width:100%;
  max-width:350px;
  text-align:center;
  transition:0.3s;
}

.result-card:hover{
  transform:scale(1.08);
  box-shadow:0 0 70px #00ff66;
}

.result-card img{
  width:100%;
  border-radius:20px;
  margin-bottom:20px;
}

.result-card a{
  color:#00ff66;
  text-decoration:none;
  font-weight:bold;
}

/* ===================================================== */
/* FIRE AROUND IMAGES */
/* ===================================================== */

.image-fire{
  position:relative;
  display:inline-block;
  border-radius:25px;
}

.image-fire::before{
  content:"";
  position:absolute;
  inset:-15px;
  background:radial-gradient(circle,
    rgba(255,0,0,0.9),
    rgba(255,80,0,0.7),
    rgba(255,150,0,0.4),
    transparent 70%
  );
  filter:blur(25px);
  z-index:-1;
  animation:fireGlow 1.8s infinite alternate;
}

@keyframes fireGlow{
  from{
    transform:scale(1);
    opacity:0.6;
  }
  to{
    transform:scale(1.25);
    opacity:1;
  }
}

/* ===================================================== */
/* RESPONSIVE */
/* ===================================================== */

@media(max-width:1024px){

  .title{
    font-size:40px;
  }

  .start-btn{
    padding:18px 60px;
    font-size:18px;
  }
}

@media(max-width:600px){

  .title{
    font-size:28px;
  }

  input, select{
    width:220px;
  }

  .start-btn{
    width:220px;
    padding:15px;
    font-size:16px;
  }

  #results{
    grid-template-columns:1fr !important;
  }

  .result-card{
    max-width:90%;
  }
}

/* ===================================================== */
/* SCROLLBAR */
/* ===================================================== */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-thumb{
  background:#00ff66;
  border-radius:20px;
}

::-webkit-scrollbar-track{
  background:black;
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<h1 class="title">Etsy Money Finder</h1>

<div class="main-center">

<div class="search-box">

<input type="text" id="keyword" placeholder="Keyword">

<select id="limit">
<option value="1">1</option>
<option value="10">10</option>
<option value="50">50</option>
<option value="100">100</option>
</select>

<button onclick="searchEtsy()" class="start-btn">
🚀 START
</button>

</div>

<div class="loader-container" id="loader">
<div class="loader">🔥</div>
</div>

<div id="results"></div>

</div>

<script src="script.js"></script>

</body>
</html>
