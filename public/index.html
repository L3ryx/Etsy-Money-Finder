<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tool</title>

<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<script src="/socket.io/socket.io.js"></script>

</head>
<body>

<!-- ===================================================== -->
<!-- USER BUTTON -->
<!-- ===================================================== -->

<div class="user-btn" onclick="goDashboard()">
👤 Mon Compte
</div>

<!-- ===================================================== -->
<!-- MAIN -->
<!-- ===================================================== -->

<div class="container">

<div id="credits">Credits: -</div>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown" id="limitDropdown"></select>

<button class="start-btn">START</button>

</div>

<div class="logs" id="logs"></div>

</div>

<!-- ===================================================== -->
<!-- RESULTS -->
<!-- ===================================================== -->

<div id="results"></div>

<!-- ===================================================== -->
<!-- LOADER -->
<!-- ===================================================== -->

<div id="loader" class="loader hidden">
<div class="spinner"></div>
<p>Recherche...</p>
</div>

<script>

/* ===================================================== */
/* TOKEN CHECK */
/* ===================================================== */

const token = localStorage.getItem("token");

if(!token){
alert("🔒 Connecte-toi !");
window.location.href="/login.html";
}

/* ===================================================== */
/* USER INFO */
/* ===================================================== */

fetch("/me",{
headers:{
Authorization:"Bearer "+token
}
})
.then(res=>res.json())
.then(data=>{
document.getElementById("credits").innerText =
"Credits: "+data.credits;
});

/* ===================================================== */
/* LIMIT 1 → 100 */
/* ===================================================== */

const dropdown = document.getElementById("limitDropdown");

for(let i=1;i<=100;i++){
const opt = document.createElement("option");
opt.value = i;
opt.textContent = "Analyse "+i+" annonces";
dropdown.appendChild(opt);
}

/* ===================================================== */
/* SOCKET LOGS */
/* ===================================================== */

const socket = io();
let socketId = null;

socket.on("connected",(data)=>{
socketId = data.socketId;
});

socket.on("log",(data)=>{
const logs = document.getElementById("logs");
logs.innerHTML += `<div>${data.time} - ${data.message}</div>`;
logs.scrollTop = logs.scrollHeight;
});

/* ===================================================== */
/* SEARCH */
/* ===================================================== */

document.querySelector(".start-btn").addEventListener("click", async()=>{

const keyword = document.querySelector(".input-field").value;
const limit = dropdown.value;

if(!keyword){
alert("Entre un keyword !");
return;
}

/* 🔥 TOKEN RECHECK */
const token = localStorage.getItem("token");
if(!token){
alert("Tu n'es pas connecté !");
return;
}

document.getElementById("loader").classList.remove("hidden");

const res = await fetch("/search-etsy",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
keyword,
limit,
socketId
})
});

const data = await res.json();

const resultsContainer = document.getElementById("results");
resultsContainer.innerHTML = "";

if(data.results && data.results.length > 0){

data.results.forEach(item=>{

const card = document.createElement("div");
card.className = "result-card";

card.innerHTML = `
<img src="${item.image}">
<br>
<a href="${item.link}" target="_blank">Voir annonce</a>
`;

resultsContainer.appendChild(card);

});

}else{
resultsContainer.innerHTML = "<p>Aucun résultat.</p>";
}

document.getElementById("loader").classList.add("hidden");

});

/* ===================================================== */
/* DASHBOARD */
/* ===================================================== */

function goDashboard(){
window.location.href="/dashboard.html";
}

</script>

</body>
</html>
