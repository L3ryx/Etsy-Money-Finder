<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="sky">

<!-- 🎨 IMAGE SOURCE -->
<img id="sourceImage" src="/background.jpg" style="display:none;">

<!-- 🚀 CANVAS 4K + ANIMATIONS -->
<canvas id="gameCanvas"></canvas>

<!-- 🔥 INTERFACE -->
<h1 class="title">Niche Finder</h1>

<div class="form-container">

<input type="text" class="input-field" placeholder="Keyword">

<select class="dropdown">
<option value="5">Analyse 5 annonces</option>
<option value="10">Analyse 10 annonces</option>
<option value="20">Analyse 20 annonces</option>
<option value="50">Analyse 50 annonces</option>
</select>

<button class="start-btn" id="startBtn">START</button>

</div>

</div>

<!-- 🚀 SCRIPT COMPLET -->

<script>

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d",{ willReadFrequently:true });
const img = document.getElementById("sourceImage");
const startBtn = document.getElementById("startBtn");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let pixels = [];
let moneyParticles = [];

/* ================= PIXEL BACKGROUND ================= */

img.onload = function(){

ctx.drawImage(img,0,0,canvas.width,canvas.height);

const pixelSize = 2;
const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;

ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<canvas.height;y+=pixelSize){
for(let x=0;x<canvas.width;x+=pixelSize){

let i = (y*canvas.width + x)*4;

pixels.push({
x:x,
y:y,
r:data[i],
g:data[i+1],
b:data[i+2],
alpha:1,
vy:Math.random()*0.3
});

}
}

animate();

};

/* ================= MONEY SPAWN ================= */

function spawnMoney(){

for(let i=0;i<8;i++){

moneyParticles.push({
x:canvas.width/2,
y:canvas.height-250,
vx:(Math.random()-0.5)*6,
vy:-Math.random()*9 -2,
alpha:1
});

}

}

/* Lancer argent quand START cliqué */
startBtn.addEventListener("click",()=>{
spawnMoney();
});

/* Auto spawn toutes les 2.5s */
setInterval(spawnMoney,2500);

/* ================= 🐕 CARTOON DOG ================= */

let dog = {
x:canvas.width/2,
y:canvas.height-220,
vy:0,
jumpForce:-18,
gravity:0.8,
onGround:true,
direction:1
};

function updateDog(){

/* Mouvement horizontal */
dog.x += 1.5 * dog.direction;

if(dog.x > canvas.width - 200 || dog.x < 100){
dog.direction *= -1;
}

/* Saut automatique */
if(dog.onGround){
dog.vy = dog.jumpForce;
dog.onGround = false;
}

/* Gravité */
dog.vy += dog.gravity;
dog.y += dog.vy;

if(dog.y >= canvas.height - 220){
dog.y = canvas.height - 220;
dog.vy = 0;
dog.onGround = true;
}

}

/* ================= DRAW DOG ================= */

function drawDog(){

ctx.save();
ctx.translate(dog.x,dog.y);

/* BODY */
ctx.fillStyle = "#8B5A2B";
ctx.beginPath();
ctx.ellipse(0,0,80,45,0,0,Math.PI*2);
ctx.fill();

/* HEAD */
ctx.beginPath();
ctx.arc(110,-15,35,0,Math.PI*2);
ctx.fill();

/* EARS */
ctx.beginPath();
ctx.moveTo(95,-50);
ctx.lineTo(110,-90);
ctx.lineTo(125,-50);
ctx.fill();

/* EYES */
ctx.fillStyle="white";
ctx.beginPath();
ctx.arc(125,-20,6,0,Math.PI*2);
ctx.arc(100,-20,6,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="black";
ctx.beginPath();
ctx.arc(125,-20,3,0,Math.PI*2);
ctx.arc(100,-20,3,0,Math.PI*2);
ctx.fill();

/* NOSE */
ctx.beginPath();
ctx.arc(112,-5,5,0,Math.PI*2);
ctx.fill();

/* LEGS */
ctx.fillStyle="#6B3E1E";
ctx.fillRect(-60,35,15,35);
ctx.fillRect(-20,35,15,35);
ctx.fillRect(20,35,15,35);
ctx.fillRect(60,35,15,35);

/* TAIL ANIMATION */
ctx.save();
ctx.translate(-90,-10);
ctx.rotate(Math.sin(Date.now()/200)*0.8);
ctx.fillRect(-50,-5,50,10);
ctx.restore();

ctx.restore();

}

/* ================= ANIMATION LOOP ================= */

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* Pixels */
pixels.forEach(p=>{

p.y += p.vy;
p.alpha -= 0.0004;

ctx.fillStyle = `rgba(${p.r},${p.g},${p.b},${p.alpha})`;
ctx.fillRect(p.x,p.y,2,2);

});

/* Money */
moneyParticles.forEach((m,index)=>{

m.x += m.vx;
m.y += m.vy;
m.vy += 0.1;
m.alpha -= 0.01;

ctx.globalAlpha = m.alpha;
ctx.font = "28px Arial";
ctx.fillText("💵",m.x,m.y);

if(m.alpha <= 0){
moneyParticles.splice(index,1);
}

});

ctx.globalAlpha = 1;

/* Dog */
updateDog();
drawDog();

requestAnimationFrame(animate);
}

</script>

</body>
</html>
