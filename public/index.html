<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Etsy Money Finder</title>

<script src="/socket.io/socket.io.js"></script>

<style>

/* ================= GLOBAL ================= */

body{
  margin:0;
  background:black;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

/* ================= MATRIX ================= */

#matrix{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* ================= TITLE ================= */

.title{
  text-align:center;
  font-size:32px;
  margin-top:30px;
  font-weight:bold;
}

/* ================= CENTER ================= */

.main-center{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:40px;
}

/* ================= SEARCH ================= */

.search-box{
  display:flex;
  gap:10px;
  align-items:center;
}

input, select{
  padding:8px;
  border-radius:8px;
  border:none;
}

/* ================= START BUTTON ================= */

.start-btn{
  background:#00ff66;
  border:none;
  padding:6px 18px;
  border-radius:20px;
  font-size:13px;
  font-weight:bold;
  cursor:pointer;
  transition:0.2s;
}

.start-btn:hover{
  transform:scale(1.1);
}

/* ================= LOADING BAR ================= */

.loading-container{
  width:60%;
  height:25px;
  background:#111;
  border-radius:20px;
  margin-top:20px;
  overflow:hidden;
  position:relative;
}

.flame-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg, red, orange, yellow);
  transition:width 0.4s ease;
  position:relative;
}

.flame-bar::after{
  content:"🔥";
  position:absolute;
  right:-8px;
  top:-8px;
  font-size:20px;
  animation:flameAnim 0.5s infinite alternate;
}

@keyframes flameAnim{
  from{ transform:scale(1);}
  to{ transform:scale(1.4);}
}

/* ================= RESULTS ================= */

#results{
  margin-top:20px;
  width:80%;
  text-align:center;
}

.result-card{
  background:#111;
  padding:15px;
  border-radius:10px;
  margin:10px 0;
}

.result-card a{
  color:#00ffcc;
  text-decoration:none;
}

</style>

</head>
<body>

<canvas id="matrix"></canvas>

<h1 class="title">Etsy Money Finder</h1>

<div class="main-center">

<div class="search-box">

<input type="text" id="keyword" placeholder="Keyword">

<select id="limit">
<option value="1">1</option>
<option value="10">10</option>
<option value="50">50</option>
<option value="100">100</option>
<option value="300">300</option>
</select>

<button onclick="searchEtsy()" class="start-btn">
🚀 START
</button>

</div>

<div class="loading-container">
<div class="flame-bar" id="progressBar"></div>
</div>

<div id="results"></div>

</div>

<script>

const socket = io();
let progress = 0;
const progressBar = document.getElementById("progressBar");

/* ============================================= */
/* SEARCH */
/* ============================================= */

async function searchEtsy(){

  // 🔥 ACCELERATE MATRIX
  setMatrixSpeed(10);

  progress = 10;
  updateProgress();

  const keyword = document.getElementById("keyword").value;
  const limit = document.getElementById("limit").value;

  const response = await fetch("/search-etsy", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ keyword, limit })
  });

  const data = await response.json();

  // ✅ FIN SCRAPING → RALENTIT MATRIX
  setMatrixSpeed(50);

  progress = 100;
  updateProgress();

  displayResults(data.results);
}

/* ============================================= */
/* PROGRESS BAR */
/* ============================================= */

function updateProgress(){
  progressBar.style.width = progress + "%";
}

/* ============================================= */
/* RESULTS */
/* ============================================= */

function displayResults(results){

  const container = document.getElementById("results");
  container.innerHTML = "";

  if(!results || results.length === 0){
    container.innerHTML = "<h3>No results found</h3>";
    return;
  }

  results.forEach(item => {

    const card = document.createElement("div");
    card.className = "result-card";

    card.innerHTML = `
      🔗 <a href="${item.link}" target="_blank">
        Open Listing
      </a>
    `;

    container.appendChild(card);

  });
}

/* ============================================= */
/* LIVE PROGRESS FROM SERVER */
/* ============================================= */

socket.on("log", () => {

  progress += 10;
  if(progress > 90) progress = 90;

  updateProgress();

});

/* ============================================= */
/* MATRIX BACKGROUND WITH SPEED CONTROL */
/* ============================================= */

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters = "010101ETSYMONEYFINDER";
const fontSize = 16;

let columns = canvas.width / fontSize;
let drops = [];
for(let i = 0; i < columns; i++){
  drops[i] = 1;
}

let matrixSpeed = 50;
let matrixInterval = setInterval(drawMatrix, matrixSpeed);

/* 🔥 CHANGE SPEED */

function setMatrixSpeed(speed){
  matrixSpeed = speed;
  clearInterval(matrixInterval);
  matrixInterval = setInterval(drawMatrix, matrixSpeed);
}

/* 🎬 DRAW MATRIX */

function drawMatrix(){

  ctx.fillStyle = "rgba(0,0,0,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#00ff00";
  ctx.font = fontSize + "px monospace";

  for(let i = 0; i < drops.length; i++){

    const text = letters[Math.floor(Math.random()*letters.length)];

    ctx.fillText(text, i*fontSize, drops[i]*fontSize);

    if(drops[i]*fontSize > canvas.height && Math.random() > 0.975){
      drops[i] = 0;
    }

    drops[i]++;
  }
}

/* RESIZE FIX */

window.addEventListener("resize", () => {

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  columns = canvas.width / fontSize;
  drops = [];

  for(let i = 0; i < columns; i++){
    drops[i] = 1;
  }

});

</script>

</body>
</html>
