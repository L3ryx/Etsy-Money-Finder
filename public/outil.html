<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outil Pro</title>

<style>

/* ================= GLOBAL ================= */

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

/* ================= BACKGROUND BEES ================= */

.bees{
position:fixed;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.bee{
position:absolute;
width:18px;
height:18px;
background:gold;
border-radius:50%;
opacity:0.9;
box-shadow:0 0 15px rgba(255,255,0,0.8);
}

/* ================= CENTER CONTENT ================= */

.container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

input{
padding:15px;
width:320px;
border-radius:15px;
border:none;
outline:none;
font-size:16px;
}

button{
padding:15px 25px;
border:none;
border-radius:15px;
background:gold;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
opacity:0.8;
}

/* ================= LOADER LENS ================= */

.loader{
display:none;
width:70px;
height:70px;
border:6px solid gold;
border-top:6px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.result{
margin-top:15px;
color:gold;
font-weight:bold;
text-align:center;
}

</style>
</head>
<body>

<!-- 🐝 BACKGROUND -->
<div class="bees" id="bees"></div>

<div class="container">

<h1>🔎 Outil Premium</h1>

<input type="text" id="query" placeholder="Tape ta recherche">

<button onclick="search()">Rechercher</button>

<div class="loader" id="loader"></div>

<div class="result" id="result"></div>

</div>

<script>

/* ===================================================== */
/* ================== REALISTIC BEES =================== */
/* ===================================================== */

const beesContainer = document.getElementById("bees");
const bees = [];

for(let i=0;i<25;i++){

const bee = document.createElement("div");
bee.classList.add("bee");

bee.style.left = Math.random()*100 + "vw";
bee.style.top = Math.random()*100 + "vh";

beesContainer.appendChild(bee);

bees.push({
element: bee,
x: Math.random()*window.innerWidth,
y: Math.random()*window.innerHeight,
vx: (Math.random()-0.5)*3,
vy: (Math.random()-0.5)*3
});

}

/* 🔥 Animation réaliste */

function animateBees(){

bees.forEach(b=>{

b.x += b.vx;
b.y += b.vy;

/* changement direction aléatoire */
if(Math.random() < 0.01){
b.vx = (Math.random()-0.5)*4;
b.vy = (Math.random()-0.5)*4;
}

/* rebond sur bords */
if(b.x < 0 || b.x > window.innerWidth) b.vx *= -1;
if(b.y < 0 || b.y > window.innerHeight) b.vy *= -1;

b.element.style.transform = `translate(${b.x}px, ${b.y}px)`;

});

requestAnimationFrame(animateBees);
}

animateBees();

/* ===================================================== */
/* ================= SEARCH FUNCTION =================== */
/* ===================================================== */

async function search(){

const query = document.getElementById("query").value;
const loader = document.getElementById("loader");
const result = document.getElementById("result");

if(!query){
alert("Tape une recherche !");
return;
}

loader.style.display = "block";
result.innerHTML = "";

const token = localStorage.getItem("token");

const res = await fetch("/search",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({query})
});

const data = await res.json();

loader.style.display = "none";

if(res.ok){
result.innerHTML = "✅ Résultat : " + data.message;
}else{
result.innerHTML = "❌ " + data.message;
}

}

</script>

</body>
</html>
