<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

/* ================= BACKGROUND BEES ================= */

.bees{
position:fixed;
width:100%;
height:100%;
z-index:-1;
overflow:hidden;
}

.bee{
position:absolute;
width:18px;
height:18px;
background:gold;
border-radius:50%;
box-shadow:0 0 15px rgba(255,255,0,0.8);
}

/* ================= CONTENT ================= */

.container{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:15px;
}

h1{
color:gold;
}

/* Input */

input, select{
padding:15px;
width:320px;
border-radius:12px;
border:none;
outline:none;
font-size:16px;
}

/* Button */

button{
padding:15px 25px;
border:none;
border-radius:12px;
background:gold;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
opacity:0.8;
}

/* Loader */

.loader{
display:none;
width:60px;
height:60px;
border:6px solid gold;
border-top:6px solid transparent;
border-radius:50%;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.result{
margin-top:10px;
color:gold;
text-align:center;
max-width:400px;
}

</style>
</head>
<body>

<!-- 🐝 Background -->
<div class="bees" id="bees"></div>

<div class="container">

<!-- ✅ TITRE MODIFIÉ -->
<h1>Niche Finder</h1>

<!-- ✅ Recherche -->
<input type="text" id="query" placeholder="Tape ta niche">

<!-- ✅ Menu déroulant 1 à 100 -->
<select id="numberSelect">
<script>
for(let i=1;i<=100;i++){
document.write(`<option value="${i}">${i}</option>`);
}
</script>
</select>

<button onclick="search()">Rechercher</button>

<div class="loader" id="loader"></div>

<div class="result" id="result"></div>

</div>

<script>

/* ===================================================== */
/* ================= REALISTIC BEES ==================== */
/* ===================================================== */

const beesContainer = document.getElementById("bees");
const bees = [];

for(let i=0;i<25;i++){

const bee = document.createElement("div");
bee.classList.add("bee");

bee.style.left = Math.random()*100 + "vw";
bee.style.top = Math.random()*100 + "vh";

beesContainer.appendChild(bee);

bees.push({
element:bee,
x:Math.random()*window.innerWidth,
y:Math.random()*window.innerHeight,
vx:(Math.random()-0.5)*3,
vy:(Math.random()-0.5)*3
});

}

function animateBees(){

bees.forEach(b=>{

b.x += b.vx;
b.y += b.vy;

if(Math.random() < 0.01){
b.vx = (Math.random()-0.5)*4;
b.vy = (Math.random()-0.5)*4;
}

if(b.x < 0 || b.x > window.innerWidth) b.vx *= -1;
if(b.y < 0 || b.y > window.innerHeight) b.vy *= -1;

b.element.style.transform = `translate(${b.x}px, ${b.y}px)`;

});

requestAnimationFrame(animateBees);
}

animateBees();

/* ===================================================== */
/* ================= SEARCH FUNCTION =================== */
/* ===================================================== */

async function search(){

const query = document.getElementById("query").value;
const number = document.getElementById("numberSelect").value;
const loader = document.getElementById("loader");
const result = document.getElementById("result");

if(!query){
alert("Tape une niche !");
return;
}

loader.style.display = "block";
result.innerHTML = "";

const token = localStorage.getItem("token");

const res = await fetch("/search",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
query,
number
})
});

await res.json();

loader.style.display = "none";

/* 🔥 Tu peux décider d’afficher ou NON le résultat */
result.innerHTML = "✅ Recherche effectuée avec succès";

}

</script>

</body>
</html>
