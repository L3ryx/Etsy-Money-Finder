<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niche Finder</title>

<script src="/socket.io/socket.io.js"></script>

<style>

/* ================= GLOBAL ================= */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
}

/* ================= CONTAINER ================= */

.container{
width:900px;
padding:40px;
}

/* ================= HEADER ================= */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.credits{
background:gold;
color:black;
padding:8px 15px;
border-radius:20px;
font-weight:bold;
}

/* ================= INPUTS ================= */

input{
width:100%;
padding:14px;
margin-bottom:10px;
border-radius:12px;
border:none;
outline:none;
background:#222;
color:white;
}

button{
padding:14px 20px;
border:none;
border-radius:12px;
background:gold;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
opacity:0.8;
}

/* ================= LOADER ================= */

.loader{
margin-top:20px;
height:6px;
background:#333;
border-radius:10px;
overflow:hidden;
display:none;
}

.loader-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,orange,red);
transition:width 0.4s;
}

/* ================= RESULTS ================= */

.results{
margin-top:30px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:#1a1a1a;
padding:15px;
border-radius:15px;
}

.card img{
width:100%;
border-radius:10px;
}

.card a{
display:block;
margin-top:10px;
color:gold;
text-decoration:none;
}

/* ================= LOGS ================= */

.logs{
margin-top:20px;
background:#111;
padding:15px;
border-radius:15px;
height:150px;
overflow:auto;
font-size:13px;
}

.log{
color:lightgreen;
}

</style>
</head>
<body>

<div class="container">

<!-- HEADER -->
<div class="header">
<h2>Niche Finder 🚀</h2>
<div class="credits" id="credits">Credits: -</div>
</div>

<!-- SEARCH -->
<input type="text" id="keyword" placeholder="Mot clé...">
<input type="number" id="limit" placeholder="Limit" value="10">
<button onclick="search()">Rechercher</button>

<div class="loader" id="loader">
<div class="loader-bar" id="loaderBar"></div>
</div>

<!-- RESULTS -->
<div class="results" id="results"></div>

<!-- LOGS -->
<div class="logs" id="logs"></div>

</div>

<script>


/* ================= SEARCH ================= */

async function search(){

const keyword = document.getElementById("keyword").value;
const limit = document.getElementById("limit").value;

if(!keyword){
alert("Keyword obligatoire");
return;
}

document.getElementById("loader").style.display="block";
document.getElementById("loaderBar").style.width="30%";

const res = await fetch("/search-etsy",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
keyword,
limit
})
});

const data = await res.json();

document.getElementById("loaderBar").style.width="100%";

setTimeout(()=>{
document.getElementById("loader").style.display="none";
},500);

displayResults(data.results || []);
}

/* ================= DISPLAY RESULTS ================= */

function displayResults(results){

const container = document.getElementById("results");
container.innerHTML = "";

results.forEach(item=>{

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<img src="${item.image}">
<a href="${item.link}" target="_blank">
Voir Listing
</a>
`;

container.appendChild(card);

});
}

</script>

</body>
</html>
