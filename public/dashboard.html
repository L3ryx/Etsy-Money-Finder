<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="/style.css">
</head>
<body>

<h1 style="text-align:center;">My Dashboard</h1>

<h2 style="text-align:center;">Mes recherches sauvegardées</h2>

<div id="savedResults"></div>

<script>

const token = localStorage.getItem("token");

if(!token){
window.location="/login";
}

async function loadDashboard(){

const res = await fetch("/dashboard",{
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

const container = document.getElementById("savedResults");

container.innerHTML = "";

data.products.forEach(product => {

const card = document.createElement("div");
card.className = "result-card";

card.innerHTML = `
<img src="${product.image}" width="200">
<br>
<a href="${product.link}" target="_blank">Voir annonce</a>
`;

container.appendChild(card);

});

}

loadDashboard();

</script>

</body>
</html>
