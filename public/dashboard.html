<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:linear-gradient(135deg,#000,#0f0f0f);
color:white;
padding:40px;
}

/* ================= HEADER ================= */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:40px;
}

.header h1{
font-weight:800;
}

.badge{
background:yellow;
color:black;
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
}

/* ================= GRID ================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* ================= CARDS ================= */

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:25px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
background:rgba(255,255,255,0.08);
}

.card h3{
color:yellow;
margin-bottom:10px;
}

/* ================= HISTORY ================= */

.history{
margin-top:15px;
max-height:180px;
overflow:auto;
}

.item{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
font-size:14px;
opacity:0.85;
}

.item:last-child{
border:none;
}

/* ================= SMALL TEXT ================= */

.small{
font-size:14px;
opacity:0.6;
}

/* ================= BUTTON ================= */

button{
background:yellow;
border:none;
padding:10px 15px;
border-radius:12px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
opacity:0.8;
}

</style>
</head>
<body>

<div class="header">
<h1>🚀 Dashboard</h1>
<span class="badge">Premium</span>
</div>

<div class="grid">

<!-- ================= STATS ================= -->

<div class="card">
<h3>📊 Statistiques</h3>

<p>Email</p>
<div id="email" class="small"></div>

<p style="margin-top:10px;">Crédits Restants</p>
<h2 id="credits"></h2>

<p class="small">Recherches utilisées : <span id="used"></span></p>

</div>

<!-- ================= PURCHASE HISTORY ================= -->

<div class="card">
<h3>💳 Historique Achats</h3>
<div id="purchases" class="history"></div>
</div>

<!-- ================= SEARCH HISTORY ================= -->

<div class="card">
<h3>🔎 Historique Recherches</h3>
<div id="searches" class="history"></div>
</div>

</div>

<script>

async function loadDashboard(){

const token = localStorage.getItem("token");

const res = await fetch("/me",{
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

document.getElementById("email").innerText = data.email;
document.getElementById("credits").innerText = data.credits;
document.getElementById("used").innerText = data.searchesUsed;

/* ================= PURCHASES ================= */

const purchaseDiv = document.getElementById("purchases");

data.purchaseHistory.forEach(p=>{

const div = document.createElement("div");
div.className="item";

div.innerHTML = `
<strong>${p.plan}</strong><br>
${p.searches} recherches<br>
<span class="small">${new Date(p.date).toLocaleString()}</span>
`;

purchaseDiv.appendChild(div);

});

/* ================= SEARCH HISTORY ================= */

const searchDiv = document.getElementById("searches");

data.searchHistory.forEach(s=>{

const div = document.createElement("div");
div.className="item";

div.innerHTML = `
<strong>${s.query}</strong><br>
${s.result}<br>
<span class="small">${new Date(s.date).toLocaleString()}</span>
`;

searchDiv.appendChild(div);

});

}

loadDashboard();

</script>

</body>
</html>
