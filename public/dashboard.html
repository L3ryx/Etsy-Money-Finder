<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

h2{
color:yellow;
}

.history{
background:#1a1a1a;
padding:15px;
border-radius:15px;
margin-top:10px;
max-height:200px;
overflow:auto;
}

.item{
border-bottom:1px solid #333;
padding:10px 0;
}

</style>
</head>
<body>

<h1>Dashboard</h1>

<div class="card">
<h2>📊 Statistiques</h2>
<p>Email: <span id="email"></span></p>
<p>Crédits restants: <span id="credits"></span></p>
<p>Recherches utilisées: <span id="used"></span></p>
</div>

<div class="card">
<h2>💳 Historique des achats</h2>
<div id="purchases" class="history"></div>
</div>

<div class="card">
<h2>🔎 Historique des recherches</h2>
<div id="searches" class="history"></div>
</div>

<script>

async function loadDashboard(){

const token = localStorage.getItem("token");

const res = await fetch("/me",{
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

document.getElementById("email").innerText = data.email;
document.getElementById("credits").innerText = data.credits;
document.getElementById("used").innerText = data.searchesUsed;

/* PURCHASES */

const purchaseDiv = document.getElementById("purchases");

data.purchaseHistory.forEach(p=>{

const div = document.createElement("div");
div.className="item";

div.innerHTML = `
Plan: ${p.plan} <br>
Recherches: ${p.searches} <br>
Date: ${new Date(p.date).toLocaleString()}
`;

purchaseDiv.appendChild(div);

});

/* SEARCH HISTORY */

const searchDiv = document.getElementById("searches");

data.searchHistory.forEach(s=>{

const div = document.createElement("div");
div.className="item";

div.innerHTML = `
Query: ${s.query} <br>
Résultat: ${s.result} <br>
Date: ${new Date(s.date).toLocaleString()}
`;

searchDiv.appendChild(div);

});

}

loadDashboard();

</script>

</body>
</html>
