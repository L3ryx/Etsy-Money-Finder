<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>

<link rel="stylesheet" href="/style.css">

</head>
<body>

<!-- ================= BUY BUTTON CENTRÉ HAUT ================= -->

<div style="text-align:center;margin-top:40px;">

<button onclick="window.location='/payment'"
style="
background:yellow;
padding:18px 70px;
border:none;
border-radius:15px;
font-size:22px;
font-weight:bold;
cursor:pointer;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
">
💵 BUY
</button>

</div>

<!-- ================= INFO BOX ================= -->

<div style="
margin:40px auto;
max-width:900px;
background:rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
text-align:center;
">

<p style="font-size:18px;font-weight:bold;">
Chaque recherche coûte 0,50 cts.
</p>

<br>

<p style="font-size:26px;font-weight:bold;">
Ceci est un moteur de recherche intelligent qui analyse,  
par un simple ajout de mot clé, les produits et affiche ceux  
qui peuvent être trouvés sur AliExpress.
</p>

<br>

<p style="font-size:18px;opacity:0.8;">
Un outil puissant qui vous fera gagner du temps.
</p>

</div>

<!-- ================= TITRE ================= -->

<h2 style="text-align:center;margin-top:40px;">
Mes recherches sauvegardées
</h2>

<!-- ================= RESULTS ================= -->

<div id="savedResults"
style="
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-top:40px;
">
</div>

<script>

/* ================= TOKEN CHECK ================= */

const token = localStorage.getItem("token");

if(!token){
window.location="/login";
}

/* ================= LOAD DASHBOARD ================= */

async function loadDashboard(){

try{

const res = await fetch("/dashboard",{
headers:{
Authorization:"Bearer "+token
}
});

if(!res.ok){
console.log("Erreur dashboard");
return;
}

const data = await res.json();

const container = document.getElementById("savedResults");
container.innerHTML = "";

if(data.products && data.products.length > 0){

data.products.forEach(product => {

const card = document.createElement("div");
card.className = "result-card";

card.innerHTML = `
<img src="${product.image}" width="200">
<br>
<a href="${product.link}" target="_blank">Voir annonce</a>
`;

container.appendChild(card);

});

}else{

container.innerHTML = "<p>Aucune recherche sauvegardée.</p>";

}

}catch(err){
console.log("Dashboard error:",err);
}

}

loadDashboard();

</script>

</body>
</html>
