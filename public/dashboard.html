<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Outil Verrouillé</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<!-- ================= TOOL CONTENT ================= -->

<div class="tool-container">

<h1>Niche Finder</h1>

</div>

<!-- ================= LOCK OVERLAY ================= -->

<div id="lockOverlay">

<div class="lock">🔒</div>

<div class="arrow">⬇</div>

<div class="flames">🔥🔥🔥</div>

<button class="unlock-btn" onclick="goPayment()">
Accéder
</button>

</div>

<script>

/* 🔐 Vérifie connexion */
if(!localStorage.getItem("token")){
window.location="/";
}

/* 🔥 Redirection paiement */
function goPayment(){
window.location="/payment.html";
}

</script>

</body>
</html>
