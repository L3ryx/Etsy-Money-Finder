<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activation Premium</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ================= CARD ================= */

.container{
width:450px;
background:#111;
padding:30px;
border-radius:30px;
box-shadow:0 0 80px rgba(255,255,255,0.08);
text-align:center;
}

/* ================= IMAGE PLUS PETITE ================= */

.payment-image{
width:60%;              /* 🔥 IMAGE PLUS PETITE */
height:auto;
border-radius:20px;
margin:0 auto 20px auto;
display:block;
box-shadow:0 0 40px rgba(255,255,255,0.1);
transition:0.3s;
}

.payment-image:hover{
transform:scale(1.05);
}

/* ================= TEXT ================= */

.highlight{
margin-top:10px;
color:yellow;
font-weight:bold;
font-size:20px;
}

.badge{
font-size:14px;
opacity:0.6;
margin-bottom:25px;
}

/* ================= BUTTON ================= */

button{
width:100%;
padding:15px;
border:none;
border-radius:15px;
background:yellow;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>
<body>

<div class="container">

<!-- 🔥 IMAGE -->
<img src="/image-payment.png" class="payment-image" alt="Premium">

<!-- 💰 TEXTE -->
<div class="highlight">
Activer l'accès Premium
</div>

<div class="badge">
Paiement sécurisé via Stripe
</div>

<!-- 🔥 BOUTON -->
<button onclick="goCheckout()">
Payer
</button>

</div>

<script>

/* ================= STRIPE CHECKOUT ================= */

async function goCheckout(){

const token = localStorage.getItem("token");

if(!token){
alert("Vous devez être connecté");
return;
}

const res = await fetch("/create-checkout-session",{
method:"POST",
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

if(data.url){
window.location.href = data.url;
}else{
alert("Erreur création session");
}

}

</script>

</body>
</html>
