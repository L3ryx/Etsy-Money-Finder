<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Paiement</title>

<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">

<style>

/* ===================================================== */
/* ===================== GLOBAL ======================== */
/* ===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Croissant One', cursive;
}

body{
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ===================================================== */
/* ===================== CONTAINER ===================== */
/* ===================================================== */

.container{
background:#111;
padding:50px;
border-radius:30px;
width:420px;
text-align:center;
box-shadow:0 0 60px rgba(0,255,102,0.3);
}

.container h2{
color:#00ff66;
margin-bottom:25px;
}

/* ===================================================== */
/* ===================== PLANS ========================= */
/* ===================================================== */

.plan{
background:#1a1a1a;
padding:20px;
border-radius:20px;
margin:15px 0;
cursor:pointer;
transition:0.3s;
border:2px solid transparent;
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
}

.plan:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff66;
}

.plan.active{
border:2px solid #00ff66;
}

.plan-title{
font-size:18px;
font-weight:bold;
color:#00ff66;
}

.plan-price{
font-size:22px;
font-weight:bold;
}

.plan-desc{
font-size:14px;
opacity:0.8;
}

/* ===================================================== */
/* ===================== BUTTON ======================== */
/* ===================================================== */

button{
width:100%;
padding:15px;
border:none;
border-radius:20px;
background:#00ff66;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-top:20px;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff66;
}

button:disabled{
opacity:0.5;
cursor:not-allowed;
}

</style>

</head>
<body>

<div class="container">

<h2>Choisir un Plan 💳</h2>

<!-- ===================================================== -->
<!-- ===================== PLANS ========================= -->
<!-- ===================================================== -->

<div class="plan" data-plan="Basic" data-price="999" data-searches="15">
<div class="plan-title">Basic</div>
<div class="plan-price">9,99€</div>
<div class="plan-desc">15 recherches</div>
</div>

<div class="plan" data-plan="Pro" data-price="2499" data-searches="40">
<div class="plan-title">Pro</div>
<div class="plan-price">24,99€</div>
<div class="plan-desc">40 recherches</div>
</div>

<div class="plan" data-plan="Elite" data-price="7999" data-searches="130">
<div class="plan-title">Elite</div>
<div class="plan-price">79,99€</div>
<div class="plan-desc">130 recherches</div>
</div>

<button id="buyBtn">Acheter</button>

</div>

<script>

/* ===================================================== */
/* TOKEN CHECK */
/* ===================================================== */

const token = localStorage.getItem("token");

if(!token){
alert("🔒 Connecte-toi d’abord !");
window.location.href="/login.html";
}

/* ===================================================== */
/* PLAN SELECTION */
/* ===================================================== */

const plans = document.querySelectorAll(".plan");
let selectedPlan = null;

plans.forEach(plan => {

plan.addEventListener("click",()=>{

plans.forEach(p=>p.classList.remove("active"));
plan.classList.add("active");

selectedPlan = {
plan: plan.dataset.plan,
amount: parseInt(plan.dataset.price),
searches: parseInt(plan.dataset.searches)
};

});

});

/* ===================================================== */
/* BUY BUTTON */
/* ===================================================== */

document.getElementById("buyBtn").addEventListener("click", async()=>{

if(!selectedPlan){
alert("Sélectionne un plan !");
return;
}

const res = await fetch("/create-checkout-session",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer " + token
},
body:JSON.stringify(selectedPlan)
});

const data = await res.json();

if(data.url){
window.location.href = data.url;
}else{
alert("Erreur paiement");
}

});

</script>

</body>
</html>
