<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ajouter Carte</title>
<script src="https://js.stripe.com/v3/"></script>

<style>

body{
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
width:400px;
}

button{
width:100%;
padding:12px;
background:#00e676;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>
<body>

<div class="box">

<h2>Ajouter votre carte</h2>

<div id="card-element"></div>

<br>

<button onclick="saveCard()">Enregistrer Carte</button>

</div>

<script>

/* 🔥 IMPORTANT — METS TA CLÉ PUBLIQUE ICI */
const stripe = Stripe("YOUR_PUBLIC_KEY");

const elements = stripe.elements();
const cardElement = elements.create("card");
cardElement.mount("#card-element");

async function saveCard(){

const token = localStorage.getItem("token");

if(!token){
alert("Connecte-toi d'abord");
return;
}

/* 🔥 CREATE PAYMENT METHOD DIRECTEMENT */

const result = await stripe.createPaymentMethod({
type: "card",
card: cardElement
});

if(result.error){
alert(result.error.message);
return;
}

/* 🔥 ENVOI AU SERVEUR */

const res = await fetch("/attach-card",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
paymentMethodId: result.paymentMethod.id
})
});

const data = await res.json();

if(res.ok){
alert("Carte enregistrée ✅");
window.location="/dashboard";
}else{
alert("Erreur");
}

}

</script>

</body>
</html>
