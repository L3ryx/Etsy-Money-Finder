<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Paiement</title>
<script src="https://js.stripe.com/v3/"></script>

<style>

body{
margin:0;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.box{
background:#111;
padding:50px;
border-radius:25px;
width:400px;
text-align:center;
}

button{
width:100%;
padding:15px;
background:yellow;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>
<body>

<div class="box">

<h2>Ajouter votre carte</h2>

<div id="card-element"></div>

<br>

<button onclick="saveCard()">Valider Carte</button>

</div>

<script>

const stripe = Stripe("TA_CLE_PUBLIQUE_ICI");

const elements = stripe.elements();
const card = elements.create("card");
card.mount("#card-element");

async function saveCard(){

const res = await fetch("/create-setup-intent",{
method:"POST",
headers:{
Authorization:"Bearer "+localStorage.getItem("token")
}
});

const data = await res.json();

const result = await stripe.confirmCardSetup(
data.client_secret,
{
payment_method:{
card:card
}
}
);

if(result.error){
alert("Erreur carte");
return;
}

await fetch("/attach-card",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+localStorage.getItem("token")
},
body:JSON.stringify({
paymentMethodId:result.setupIntent.payment_method
})
});

alert("Carte enregistrée ✅");

window.location="/";

}

</script>

</body>
</html>
