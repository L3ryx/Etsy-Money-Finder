<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajouter Carte</title>

<script src="https://js.stripe.com/v3/"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
width:400px;
text-align:center;
backdrop-filter:blur(10px);
}

h2{
margin-bottom:20px;
}

#card-element{
background:white;
padding:15px;
border-radius:10px;
color:black;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#00e676;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>
<body>

<div class="box">

<h2>💳 Ajouter votre carte</h2>

<div id="card-element"></div>

<button onclick="saveCard()">Enregistrer Carte</button>

<p style="margin-top:15px;">
<a href="/dashboard" style="color:#00e676;">Retour Dashboard</a>
</p>

</div>

<script>

/* 🔥 METS TA VRAIE CLÉ PUBLIQUE ICI */
const stripe = Stripe(pk_live_51T7tExGaaKHR3H6cYk0dqaId2i0ByoKPAAt7gsiosHw7Jg0VoMazHvXFyYo1EmjxsVk8nQ4RWQgdUS7EPvC5UuG700S5aUHblq);

const elements = stripe.elements();
const cardElement = elements.create("card");
cardElement.mount("#card-element");

async function saveCard(){

const token = localStorage.getItem("token");

if(!token){
alert("Connecte-toi d'abord");
return;
}

/* 🔥 Création Payment Method */

const result = await stripe.createPaymentMethod({
type: "card",
card: cardElement
});

if(result.error){
alert(result.error.message);
return;
}

/* 🔥 Envoi au backend */

const response = await fetch("/attach-card",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
paymentMethodId: result.paymentMethod.id
})
});

const data = await response.json();

if(response.ok){
alert("Carte enregistrée ✅");
window.location="/dashboard";
}else{
alert(data.message || "Erreur lors de l'enregistrement");
}

}

</script>

</body>
</html>
