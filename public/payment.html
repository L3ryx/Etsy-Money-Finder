<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choisir un plan</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:500px;
background:#111;
padding:30px;
border-radius:30px;
box-shadow:0 0 80px rgba(255,255,255,0.08);
text-align:center;
}

.plan{
background:#1a1a1a;
padding:20px;
border-radius:20px;
margin-bottom:15px;
transition:0.3s;
}

.plan:hover{
transform:scale(1.03);
}

.plan h3{
color:yellow;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
background:yellow;
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

</style>
</head>
<body>

<div class="container">

<h2>Choisir un plan</h2>

<!-- BASIC -->
<div class="plan">
<h3>Basic — 9,99€</h3>
<p>15 recherches</p>
<button onclick="checkout(999,'Basic',15)">
Acheter
</button>
</div>

<!-- PRO -->
<div class="plan">
<h3>Pro — 24,99€</h3>
<p>40 recherches</p>
<button onclick="checkout(2499,'Pro',40)">
Acheter
</button>
</div>

<!-- ELITE -->
<div class="plan">
<h3>Élite — 79,99€</h3>
<p>130 recherches</p>
<button onclick="checkout(7999,'Elite',130)">
Acheter
</button>
</div>

</div>

<script>

async function checkout(amount, plan, searches){

const token = localStorage.getItem("token");

if(!token){
alert("Connecte toi d'abord");
return;
}

const res = await fetch("/create-checkout-session",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
amount,
plan,
searches
})
});

const data = await res.json();

if(data.url){
window.location.href = data.url;
}else{
alert("Erreur paiement");
}

}

</script>

</body>
</html>
