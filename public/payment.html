<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activation Premium</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ================= CARD ================= */

.container{
width:500px;
background:#111;
padding:40px;
border-radius:35px;
box-shadow:0 0 100px rgba(255,255,255,0.1);
text-align:center;
}

/* ================= IMAGE (PLUS GRANDE + PREMIUM) ================= */

.payment-image{
width:100%;
height:400px; /* 🔥 IMAGE PLUS GRANDE */
object-fit:cover;
border-radius:30px;
box-shadow:0 0 70px rgba(255,255,255,0.2);
transition:0.3s;
}

.payment-image:hover{
transform:scale(1.03);
}

/* ================= PRICE ================= */

.highlight{
margin-top:25px;
color:yellow;
font-weight:bold;
font-size:22px;
}

.badge{
font-size:14px;
opacity:0.6;
margin-top:10px;
margin-bottom:30px;
}

/* ================= BUTTON ================= */

button{
width:100%;
padding:18px;
border:none;
border-radius:18px;
background:yellow;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>
<body>

<div class="container">

<!-- 🔥 IMAGE -->
<img src="/image-payment.png" class="payment-image">

<!-- 💰 PRICE -->
<div class="highlight">
Activer l'accès
</div>

<div class="badge">
Paiement sécurisé via Stripe
</div>

<!-- 🔥 BUTTON -->
<button onclick="goCheckout()">
Payer
</button>

</div>

<script>

/* ================= REDIRECTION STRIPE ================= */

async function goCheckout(){

const token = localStorage.getItem("token");

if(!token){
alert("Vous devez être connecté");
return;
}

const res = await fetch("/create-checkout-session",{
method:"POST",
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

if(data.url){
window.location.href = data.url;
}else{
alert("Erreur création session");
}

}

</script>

</body>
</html>
