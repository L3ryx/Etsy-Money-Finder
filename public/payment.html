<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activation Premium</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ================= CARD ================= */

.container{
width:500px;
background:#111;
padding:50px;
border-radius:30px;
box-shadow:0 0 80px rgba(255,255,255,0.1);
text-align:center;
}

/* ================= TEXT ================= */

.title{
font-size:22px;
font-weight:bold;
line-height:1.6;
}

.highlight{
color:yellow;
font-weight:bold;
margin-top:15px;
font-size:20px;
}

/* ================= BUTTON ================= */

button{
margin-top:40px;
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:yellow;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* ================= BADGE ================= */

.badge{
margin-top:20px;
font-size:14px;
opacity:0.6;
}

</style>

</head>
<body>

<div class="container">

<div class="title">
Un moteur de recherche intelligent qui analyse les produits à partir d’un simple mot-clé et identifie automatiquement ceux disponibles sur AliExpress.<br><br>
Les niches n'ont plus de secrets !
</div>

<div class="highlight">
0,50€ par recherche
</div>

<div class="badge">
Paiement sécurisé via Stripe
</div>

<button onclick="goCheckout()">
Activer le système de paiement
</button>

</div>

<script>

/* ================= REDIRECTION STRIPE ================= */

async function goCheckout(){

const token = localStorage.getItem("token");

if(!token){
alert("Vous devez être connecté");
return;
}

const res = await fetch("/create-checkout-session",{
method:"POST",
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

if(data.url){
window.location.href = data.url;
}else{
alert("Erreur création session");
}

}

</script>

</body>
</html>
