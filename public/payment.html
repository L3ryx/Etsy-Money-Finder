<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activation Premium</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* ================= CARD ================= */

.container{
width:500px;
background:#111;
padding:40px;
border-radius:30px;
box-shadow:0 0 80px rgba(255,255,255,0.1);
text-align:center;
}

/* ================= IMAGE BOX BLEU ================= */

.image-box{
background:#0044ff;
padding:15px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 0 30px rgba(0,68,255,0.4);
}

.payment-image{
width:100%;
max-height:200px;
object-fit:cover;
border-radius:15px;
}

/* ================= PRICE ================= */

.highlight{
color:yellow;
font-weight:bold;
font-size:22px;
margin-bottom:10px;
}

.badge{
font-size:14px;
opacity:0.6;
margin-bottom:30px;
}

/* ================= BUTTON ================= */

button{
width:100%;
padding:18px;
border:none;
border-radius:15px;
background:yellow;
font-weight:bold;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

</style>

</head>
<body>

<div class="container">

<!-- 🔵 IMAGE DANS CADRE BLEU -->
<div class="image-box">
<img src="/image-payment.png" class="payment-image">
</div>

<!-- 💰 PRICE -->
<div class="highlight">
0,50€ par recherche
</div>

<div class="badge">
Paiement sécurisé via Stripe
</div>

<!-- 🔥 BUTTON -->
<button onclick="goCheckout()">
Activer le système de paiement
</button>

</div>

<script>

/* ================= STRIPE REDIRECT ================= */

async function goCheckout(){

const token = localStorage.getItem("token");

if(!token){
alert("Vous devez être connecté");
return;
}

const res = await fetch("/create-checkout-session",{
method:"POST",
headers:{
Authorization:"Bearer "+token
}
});

const data = await res.json();

if(data.url){
window.location.href = data.url;
}else{
alert("Erreur création session");
}

}

</script>

</body>
</html>
