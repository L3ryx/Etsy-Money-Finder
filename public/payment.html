<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ajouter Carte</title>
<script src="https://js.stripe.com/v3/"></script>

<style>

body{
margin:0;
font-family:Arial;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
width:400px;
text-align:center;
}

#card-element{
background:white;
padding:15px;
border-radius:10px;
color:black;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:#00e676;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>
<body>

<div class="box">

<h2>💳 Ajouter votre carte</h2>

<div id="card-element"></div>

<button onclick="saveCard()">Enregistrer Carte</button>

<p style="margin-top:15px;">
<a href="/dashboard" style="color:#00e676;">Retour</a>
</p>

</div>

<script>

/* 🔥 METS TA VRAIE CLÉ PUBLIQUE ICI */
const stripe = Stripe("pk_live_xxxxxxxxx");

const elements = stripe.elements();
const cardElement = elements.create("card");
cardElement.mount("#card-element");

async function saveCard(){

const token = localStorage.getItem("token");

if(!token){
alert("Connecte-toi");
return;
}

/* 🔥 CREATE PAYMENT METHOD */

const result = await stripe.createPaymentMethod({
type:"card",
card:cardElement
});

if(result.error){
alert(result.error.message);
return;
}

/* 🔥 ENVOI AU BACKEND */

const res = await fetch("/attach-card",{
method:"POST",
headers:{
"Content-Type":"application/json",
Authorization:"Bearer "+token
},
body:JSON.stringify({
paymentMethodId: result.paymentMethod.id
})
});

const data = await res.json();

if(res.ok){
alert("Carte enregistrée ✅");
window.location="/dashboard";
}else{
alert("Erreur carte");
}

}

</script>

</body>
</html>
