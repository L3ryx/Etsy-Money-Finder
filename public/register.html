<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inscription</title>

<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">

<style>

/* ===================================================== */
/* ================= GLOBAL ============================ */
/* ===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Croissant One', cursive;
}

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* ===================================================== */
/* ================= BOX =============================== */
/* ===================================================== */

.box{
background:#111;
padding:45px;
border-radius:30px;
width:380px;
text-align:center;
box-shadow:0 0 60px rgba(0,255,102,0.3);
}

.box h2{
color:#00ff66;
margin-bottom:25px;
}

/* ===================================================== */
/* ================= INPUT ============================= */
/* ===================================================== */

.box input{
width:100%;
padding:14px;
margin:10px 0;
border-radius:15px;
border:none;
outline:none;
background:#222;
color:white;
font-size:14px;
}

/* ===================================================== */
/* ================= BUTTON ============================ */
/* ===================================================== */

.box button{
width:100%;
padding:14px;
border:none;
border-radius:20px;
background:#00ff66;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
margin-top:10px;
}

.box button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff66;
}

/* ===================================================== */
/* ================= SWITCH ============================ */
/* ===================================================== */

.switch{
margin-top:15px;
font-size:14px;
}

.switch a{
color:#00ff66;
text-decoration:none;
}

.switch a:hover{
text-decoration:underline;
}

</style>

</head>
<body>

<div class="box">

<h2>Créer un compte ✨</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="register()">Créer un compte</button>

<div class="switch">
Déjà inscrit ?
<a href="/login.html">Se connecter</a>
</div>

</div>

<script>

/* ===================================================== */
/* REGISTER + LOGIN AUTOMATIQUE */
/* ===================================================== */

async function register(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(!email || !password){
alert("Remplis tous les champs !");
return;
}

/* 🔥 CREATION COMPTE */

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(!res.ok){
alert(data.message || "Erreur création");
return;
}

/* ===================================================== */
/* 🔥 LOGIN AUTOMATIQUE APRES INSCRIPTION */
/* ===================================================== */

const loginRes = await fetch("/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const loginData = await loginRes.json();

if(loginRes.ok){

/* 🔐 STOCK TOKEN */
localStorage.setItem("token", loginData.token);

alert("Compte créé ✅ Connexion automatique");

/* 🚀 REDIRECTION DIRECTE VERS PAYMENT */
window.location.href="/payment.html";

}else{
alert("Login automatique échoué");
}

}

/* ===================================================== */
/* AUTO REDIRECT SI DEJA CONNECTÉ */
/* ===================================================== */

window.onload = function(){

const token = localStorage.getItem("token");

if(token){
window.location.href="/index.html";
}

};

</script>

</body>
</html>
