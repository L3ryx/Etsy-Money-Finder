<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:black;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
}

/* 🔥 CONTAINER GLOBAL */

.container{
display:flex;
flex-direction:column;
align-items:center;
}

/* 🔥 IMAGE */

.container img{
width:300px;
max-width:90%;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 50px rgba(255,255,255,0.2);
object-fit:cover;
}

/* 🔥 BOX INSCRIPTION */

.box{
background:#111;
padding:40px;
border-radius:30px;
width:350px;
text-align:center;
box-shadow:0 0 80px rgba(255,255,255,0.1);
}

.box h2{
color:yellow;
margin-bottom:20px;
}

.box input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:12px;
border:none;
outline:none;
background:#222;
color:white;
}

.box button{
width:100%;
padding:12px;
border:none;
border-radius:12px;
background:yellow;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.box button:hover{
transform:scale(1.05);
}

.switch{
margin-top:15px;
font-size:14px;
}

.switch a{
color:#00aaff;
text-decoration:none;
}

</style>
</head>
<body>

<div class="container">

<!-- ✅ IMAGE (CHANGE LE NOM SI BESOIN) -->
<img src="/image-register.png" alt="Image">

<div class="box">

<h2>Créer un compte</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="register()">Créer un compte</button>

<div class="switch">
Déjà inscrit ? <a href="/login.html">Se connecter</a>
</div>

</div>

</div>

<script>

async function register(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(res.ok){
alert("Compte créé ✅");
window.location.href="/payment.html";
}else{
alert(data.message);
}

}

</script>

</body>
</html>
