<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription</title>

<link href="https://fonts.googleapis.com/css2?family=Croissant+One&display=swap" rel="stylesheet">

<style>

/* ===================================================== */
/* ================= GLOBAL THEME ====================== */
/* ===================================================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Croissant One', cursive;
}

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* ===================================================== */
/* ================= BOX (MÊME STYLE LOGIN) ============ */
/* ===================================================== */

.box{
background:#111;
padding:40px;
border-radius:25px;
width:350px;
text-align:center;
box-shadow:0 0 40px rgba(0,255,102,0.3);
}

/* ===================================================== */
/* ================= TITRE ============================= */
/* ===================================================== */

.box h2{
margin-bottom:25px;
color:#00ff66;
}

/* ===================================================== */
/* ================= INPUT ============================= */
/* ===================================================== */

.box input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:15px;
outline:none;
font-size:14px;
background:#222;
color:white;
}

/* ===================================================== */
/* ================= BUTTON ============================ */
/* ===================================================== */

.box button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:20px;
background:#00ff66;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.box button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00ff66;
}

/* ===================================================== */
/* ================= SWITCH LOGIN ====================== */
/* ===================================================== */

.switch{
margin-top:15px;
font-size:14px;
}

.switch a{
color:#00ff66;
text-decoration:none;
cursor:pointer;
}

.switch a:hover{
text-decoration:underline;
}

</style>

</head>
<body>

<div class="box">

<h2>Créer un compte ✨</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Mot de passe">

<button onclick="register()">Créer un compte</button>

<div class="switch">
Déjà inscrit ?
<a href="/login.html">Se connecter</a>
</div>

</div>

<script>

/* ===================================================== */
/* REGISTER FUNCTION */
/* ===================================================== */

async function register(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

if(!email || !password){
alert("Remplis tous les champs !");
return;
}

const res = await fetch("/register",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({email,password})
});

const data = await res.json();

if(res.ok){
alert("Compte créé ✅");
window.location.href="/payment.html";
}else{
alert(data.message || "Erreur inscription");
}

}

</script>

</body>
</html>
